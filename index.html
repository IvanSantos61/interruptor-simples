<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT Pro - Laboratório</title>
    <style>
        body { 
            margin: 0; 
            background-color: #0b0e14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }

        h2 { 
            color: #00ffff; 
            margin-top: 15px; 
            font-size: 18px; 
            text-shadow: 0 0 10px #00ffff; 
            text-transform: uppercase;
        }

        #quadro { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid #2c3e50; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            margin-top: 10px; 
        }

        .fundo { 
            width: 100%; 
            display: block; 
            pointer-events: none; 
        }

        /* --- ALAVANCAS --- */
        .alavanca {
            position: absolute;
            z-index: 100;
            cursor: pointer;
            display: block;
        }

        #img-dg { width: 28.5px; top: 25%; left: 11.2%; }
        #img-dr { width: 30px; top: 27.8%; left: 23%; }
        #img-dj16 { width: 20px; top: 26%; left: 32.2%; }

        /* --- BORNES DE CONEXÃO --- */
        .borne {
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(0, 255, 255, 0.3);
            border: 1px solid #00ffff;
            border-radius: 50%;
            z-index: 150;
            cursor: pointer;
            box-shadow: 0 0 8px #00ffff;
            transition: 0.3s;
        }

        .borne:hover {
            background: rgba(0, 255, 255, 0.8);
            transform: scale(1.2);
        }

        /* Exemplos de posições de bornes - Ajuste conforme o fundo */
        #borne-fase-entrada { top: 10%; left: 10%; } 
        #borne-dg-entrada { top: 18%; left: 11%; }
        #borne-dr-entrada { top: 18%; left: 23%; }

        /* --- INTERFACE --- */
        .status-box {
            margin: 15px 0;
            padding: 10px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            border-radius: 8px;
            border: 1px solid #2c3e50;
            min-height: 35px;
        }

        #status-texto { 
            color: #ffcc00; 
            font-weight: bold; 
            font-size: 13px; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h2>Laboratório SMT Pro</h2>
    
    <div class="status-box">
        <span id="status-texto">Inicie a fiação clicando nos bornes</span>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">

        <img id="img-dg" src="./al_dg_off.png" class="alavanca" onclick="bloqueio()">
        <img id="img-dr" src="./al_dr_off.png" class="alavanca" onclick="bloqueio()">
        <img id="img-dj16" src="./al_dj16_off.png" class="alavanca" onclick="bloqueio()">

        <div id="borne-fase-entrada" class="borne" onclick="conectar('fase1')"></div>
        <div id="borne-dg-entrada" class="borne" onclick="conectar('dg1')"></div>
        <div id="borne-dr-entrada" class="borne" onclick="conectar('dr1')"></div>
    </div>

    <audio id="som-conexao" src="./conexão.mp3" preload="auto"></audio>
    <audio id="som-disj" src="./disj.mp3" preload="auto"></audio>

    <script>
        function conectar(id) {
            document.getElementById('som-conexao').play();
            const txt = document.getElementById('status-texto');
            txt.innerText = "Borne " + id + " selecionado. Faça a próxima conexão.";
            txt.style.color = "#00ffff";
        }

        function bloqueio() {
            const txt = document.getElementById('status-texto');
            txt.innerText = "BLOQUEADO: FINALIZE A FIAÇÃO PRIMEIRO";
            txt.style.color = "#ff4444";
            setTimeout(() => {
                txt.innerText = "Inicie a fiação clicando nos bornes";
                txt.style.color = "#ffcc00";
            }, 2000);
        }
    </script>
</body>
</html>
