<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aula Interativa - Sequência Lógica</title>
    <style>
        body { margin: 0; background-color: #0b0e14; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; overflow: hidden; touch-action: none; }
        h2 { color: #00ffff; margin-top: 15px; font-size: 18px; text-shadow: 0 0 10px #00ffff; }

        #quadro { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid #2c3e50; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            margin-top: 10px; 
        }

        .fundo { width: 100%; display: block; pointer-events: none; }
        
        /* ÁREAS DE CLIQUE INVISÍVEIS */
        /* Ajustaremos as posições (top/left) conforme você testar */
        .area-clique { 
            position: absolute; 
            cursor: pointer; 
            z-index: 100;
            /* background: rgba(255, 0, 0, 0.3); */ /* Descomente esta linha para enxergar onde está clicando ao testar */
        }

        #alavanca-dg { width: 60px; height: 80px; top: 15%; left: 15%; }
        #alavanca-dj16 { width: 40px; height: 80px; top: 15%; left: 40%; }
        #alavanca-interrup { width: 50px; height: 80px; bottom: 20%; right: 15%; }

        .status { margin: 15px 0; text-align: center; color: #ffcc00; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

    <h2>Laboratório: Sequência de Energização</h2>
    <div class="status" id="status">SISTEMA DESLIGADO</div>

    <div id="quadro">
        <img src="AMBIENTE.jpg" class="fundo">

        <div id="alavanca-dg" class="area-clique" onclick="acionar('dg')"></div>
        <div id="alavanca-dj16" class="area-clique" onclick="acionar('dj16')"></div>
        <div id="alavanca-interrup" class="area-clique" onclick="acionar('interrup')"></div>
    </div>

    <audio id="som-disj" src="disj.mp3" preload="auto"></audio>

    <script>
        let ligado = { dg: false, dj16: false, interrup: false };

        function acionar(componente) {
            const som = document.getElementById('som-disj');
            som.currentTime = 0;
            som.play().catch(() => {});

            // Inverte o estado (On/Off)
            ligado[componente] = !ligado[componente];

            atualizarLogica();
        }

        function atualizarLogica() {
            const msg = document.getElementById('status');

            if (!ligado.dg) {
                msg.innerText = "SISTEMA DESLIGADO (GERAL OFF)";
                msg.style.color = "#ff4444";
            } 
            else if (ligado.dg && !ligado.dj16) {
                msg.innerText = "GERAL LIGADO - AGUARDANDO CIRCUITO";
                msg.style.color = "#ffcc00";
            }
            else if (ligado.dg && ligado.dj16 && !ligado.interrup) {
                msg.innerText = "CIRCUITO ENERGIZADO - LIGUE O INTERRUPTOR";
                msg.style.color = "#00ffff";
            }
            else if (ligado.dg && ligado.dj16 && ligado.interrup) {
                msg.innerText = "⚡ LÂMPADA ACESA COM SUCESSO!";
                msg.style.color = "#00ff00";
            }
        }
    </script>
</body>
</html>
