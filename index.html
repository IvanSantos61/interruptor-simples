<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laboratório SMT Pro</title>
    <style>
        body { 
            margin: 0; 
            background-color: #0b0e14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }

        h2 { 
            color: #00ffff; 
            margin-top: 15px; 
            font-size: 18px; 
            text-shadow: 0 0 10px #00ffff; 
            text-transform: uppercase;
        }

        #quadro { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid #2c3e50; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            margin-top: 10px; 
        }

        .fundo { 
            width: 100%; 
            display: block; 
            pointer-events: none; 
        }

        /* CONFIGURAÇÃO DAS ALAVANCAS (NOMES EXATOS DO GITHUB) */
        .alavanca {
            position: absolute;
            z-index: 100;
            cursor: pointer;
            /* Borda verde para ajuste de posição */
            outline: 1px solid #00ff00;
        }

        /* AJUSTE AS POSIÇÕES ABAIXO CONFORME O SEU FUNDO */
        #img-dg { width: 50px; top: 20%; left: 15%; }
        #img-dr { width: 50px; top: 20%; left: 35%; }
        #img-dj16 { width: 45px; top: 20%; left: 55%; }

        .status-box {
            margin: 15px 0;
            padding: 10px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            border-radius: 8px;
            border: 1px solid #2c3e50;
            min-height: 30px;
        }

        #status-texto { 
            color: #ffcc00; 
            font-weight: bold; 
            font-size: 13px; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h2>Laboratório Interativo</h2>
    
    <div class="status-box">
        <span id="status-texto">POSICIONE AS ALAVANCAS SOBRE O QUADRO</span>
    </div>

    <div id="quadro">
        <img src="ambiente.jpg" class="fundo">

        <img id="img-dg" src="al_dg_off.png" class="alavanca" onclick="bloqueio()">
        <img id="img-dr" src="al_dr_off.png" class="alavanca" onclick="bloqueio()">
        <img id="img-dj16" src="al_dj16_off.png" class="alavanca" onclick="bloqueio()">
    </div>

    <audio id="som-disj" src="disj.mp3" preload="auto"></audio>

    <script>
        function bloqueio() {
            const txt = document.getElementById('status-texto');
            txt.innerText = "BLOQUEADO: FINALIZE A FIAÇÃO PRIMEIRO";
            txt.style.color = "#ff4444";
            
            setTimeout(() => {
                txt.innerText = "POSICIONE AS ALAVANCAS SOBRE O QUADRO";
                txt.style.color = "#ffcc00";
            }, 2000);
        }
    </script>
</body>
</html>
