<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT Pro - Laboratório</title>
    <style>
        body { margin: 0; background-color: #050a18; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; overflow: hidden; touch-action: none; }
        h2 { color: #00ffff; margin-top: 15px; font-size: 18px; text-shadow: 0 0 10px #00ffff; text-transform: uppercase; }
        
        .status-box { margin: 15px 0; padding: 10px; width: 90%; max-width: 480px; text-align: center; background: rgba(5, 15, 30, 0.9); border-radius: 8px; border: 1px solid #1a2a3a; min-height: 45px; display: flex; align-items: center; justify-content: center; }
        
        .msg-vermelha { color: #ff0000; font-weight: bold; text-transform: uppercase; }
        .msg-branca { color: #ffffff; font-weight: bold; text-transform: uppercase; }
        #status-texto { font-size: 11px; letter-spacing: 1px; line-height: 1.4; }

        .pilula { padding: 8px 20px; border-radius: 50px; color: white; font-weight: 900; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-transform: uppercase; letter-spacing: 1px; }
        .ligada { background-color: #ff0000; border: 2px solid #800000; }
        .desligada { background-color: #00ff00; border: 2px solid #006400; color: #003300; }

        /* Painel Concluído */
        #painel-concluido { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7); width: 300px; height: 150px; background: #1a1a1a; border: 4px solid #333; border-radius: 15px; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 50px rgba(0,0,0,0.9); opacity: 0; visibility: hidden; transition: all 0.5s; pointer-events: none; }
        #painel-concluido.mostrar { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        
        .parafuso { position: absolute; width: 14px; height: 14px; background: radial-gradient(circle at 30% 30%, #888, #444); border-radius: 50%; border: 1px solid #222; }
        .p-tl { top: 10px; left: 10px; } .p-tr { top: 10px; right: 10px; }
        .p-bl { bottom: 10px; left: 10px; } .p-br { bottom: 10px; right: 10px; }
        #check-concluido { color: #00ff00; font-size: 55px; font-weight: bold; }
        #texto-concluido { color: #00ff00; font-size: 22px; font-weight: 900; text-transform: uppercase; }

        #quadro { position: relative; width: 100%; max-width: 500px; border: 2px solid #1a2a3a; border-radius: 12px; overflow: hidden; background: #02050d; margin-top: 10px; }
        .fundo { width: 100%; display: block; pointer-events: none; }
        .alavanca, .tecla, .lampada { position: absolute; z-index: 100; cursor: pointer; display: block; }
        
        #img-dg { width: 25.5px; top: 25%; left: 11.2%; }
        #img-dr { width: 30px; top: 27.8%; left: 23%; }
        #img-dj16 { width: 20px; top: 25%; left: 32%; }
        #img-interruptor { width: 29px; top: 72.4%; left: 72%; z-index: 110; }
        #img-lampada { width: 120px; top: 46.8%; left: 76%; z-index: 105; display: none; }

        .fio { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 40; display: none; pointer-events: none; filter: drop-shadow(3px 5px 4px rgba(0,0,0,0.7)); }
        .borne { position: absolute; width: 14px; height: 14px; background: rgba(0, 255, 255, 0.4); border: 2px solid #00ffff; border-radius: 50%; z-index: 150; cursor: pointer; transform: translate(-50%, -50%); display: none; }
        .borne.ativo { display: block; }
        .borne.selecionado { background: #00ff00; border-color: #ffffff; box-shadow: 0 0 15px #00ff00; }

        #borne-dj16-saida { top: 38%; left: 27%; } 
        #borne-inter-entrada { top: 81%; left: 68%; } 
        #borne-inter-saida { top: 75%; left: 68%; }    
        #borne-lampada-retorno { top: 56%; left: 89%; }
        #borne-barramento-neutro { top: 33%; left: 44%; }
        #borne-lampada-neutro { top: 56%; left: 92%; }

        #btn-reiniciar { position: absolute; top: 95%; left: 50%; transform: translate(-50%, -50%); padding: 4px 18px; background: linear-gradient(to bottom, #e60000, #990000); border: none; color: white; font-size: 9px; font-weight: bold; cursor: pointer; border-radius: 50px; z-index: 200; text-transform: uppercase; }
    </style>
</head>
<body>

    <h2>Laboratório SMT Pro</h2>
    
    <div class="status-box" id="caixa-status">
        <span id="status-texto">
            <span class="msg-vermelha">CONECTE A FASE:</span> 
            <span class="msg-branca">CLIQUE NA REFERÊNCIA INDICADO NO DR</span>
        </span>
    </div>

    <div id="painel-concluido">
        <div class="parafuso p-tl"></div><div class="parafuso p-tr"></div>
        <div class="parafuso p-bl"></div><div class="parafuso p-br"></div>
        <div id="check-concluido">✓</div>
        <div id="texto-concluido">CONCLUÍDO !!!!!</div>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">
        <button id="btn-reiniciar" onclick="location.reload()">Reiniciar</button>

        <img id="fio-fase" src="./FASE/quadro0000.png" class="fio">
        <img id="fio-retorno" src="./RETORNO/quadro0000.png" class="fio">
        <img id="fio-neutro" src="./NEUTRO/quadro0000.png" class="fio">

        <img id="img-dg" src="./al_dg_off.png" class="alavanca" onclick="alternarDG()">
        <img id="img-dr" src="./al_dr_off.png" class="alavanca" onclick="alternarDR()">
        <img id="img-dj16" src="./al_dj16_off.png" class="alavanca" onclick="alternarDJ16()">
        <img id="img-lampada" src="./lamp_on.png" class="lampada">
        <img id="img-interruptor" src="./tec_int_off.png" class="tecla" onclick="alternarInterruptor()">

        <div id="borne-dj16-saida" class="borne ativo" onclick="cliqueBorne('dj16')"></div>
        <div id="borne-inter-entrada" class="borne ativo" onclick="cliqueBorne('inter_in')"></div>
        <div id="borne-inter-saida" class="borne" onclick="cliqueBorne('inter_out')"></div>
        <div id="borne-lampada-retorno" class="borne" onclick="cliqueBorne('lamp_ret')"></div>
        <div id="borne-barramento-neutro" class="borne" onclick="cliqueBorne('neutro_bar')"></div>
        <div id="borne-lampada-neutro" class="borne" onclick="cliqueBorne('lamp_neu')"></div>
    </div>

    <audio id="som-conexao" src="./conexão.mp3" preload="auto"></audio>
    <audio id="som-disjuntor" src="./disj.mp3" preload="auto"></audio>
    <audio id="som-interruptor" src="./int.mp3" preload="auto"></audio>

    <script>
        let faseStatus = 'desconectado', retornoStatus = 'desconectado', neutroStatus = 'desconectado';
        let dgLigado = false, drLigado = false, dj16Ligado = false, interLigado = false;
        let jaAcedeuUmaVez = false;

        const arquivosFase = ["quadro0000.png", "quadro0006.png", "quadro0012.png", "quadro0018.png", "quadro0024.png", "quadro0030.png"];
        const arquivosRetorno = ["quadro0000.png", "quadro0006.png", "quadro0012.png", "quadro0018.png", "quadro0024.png", "quadro0030.png", "quadro0036.png"];
        const arquivosNeutro = ["quadro0000.png", "quadro0006.png", "quadro0012.png", "quadro0018.png", "quadro0024.png", "quadro0030.png", "quadro0036.png", "quadro0042.png", "quadro0048.png", "quadro0054.png", "quadro0060.png", "quadro0066.png", "quadro0072.png", "quadro0078.png"];

        function trocarPares(esconder, mostrar) {
            esconder.forEach(id => document.getElementById(id).classList.remove('ativo', 'selecionado'));
            mostrar.forEach(id => document.getElementById(id).classList.add('ativo'));
        }

        function cliqueBorne(local) {
            const txt = document.getElementById('status-texto');
            const som = document.getElementById('som-conexao');
            
            if (local === 'dj16' && faseStatus === 'desconectado') {
                faseStatus = 'iniciado'; 
                document.getElementById('borne-dj16-saida').classList.add('selecionado');
                txt.innerHTML = '<span class="msg-vermelha">CONECTE A FASE:</span> <span class="msg-branca">CLIQUE NA REFERÊNCIA DO INTERRUPTOR</span>';
            } 
            else if (local === 'inter_in' && faseStatus === 'iniciado') {
                faseStatus = 'concluido'; som.play();
                document.getElementById('borne-inter-entrada').classList.add('selecionado');
                animarFio('fio-fase', arquivosFase, 0, () => { 
                    trocarPares(['borne-dj16-saida', 'borne-inter-entrada'], ['borne-inter-saida', 'borne-lampada-retorno']);
                    txt.innerHTML = '<span class="msg-vermelha">CONECTE O RETORNO:</span> <span class="msg-branca">CLIQUE NA REFERÊNCIA DO INTERRUPTOR</span>';
                });
            } 
            else if (local === 'inter_out' && retornoStatus === 'desconectado') {
                retornoStatus = 'iniciado'; document.getElementById('borne-inter-saida').classList.add('selecionado');
                txt.innerHTML = '<span class="msg-vermelha">CONECTE O RETORNO:</span> <span class="msg-branca">CLIQUE NA REFERÊNCIA DA LÂMPADA</span>';
            }
            else if (local === 'lamp_ret' && retornoStatus === 'iniciado') {
                retornoStatus = 'concluido'; som.play();
                document.getElementById('borne-lampada-retorno').classList.add('selecionado');
                animarFio('fio-retorno', arquivosRetorno, 0, () => { 
                    trocarPares(['borne-inter-saida', 'borne-lampada-retorno'], ['borne-barramento-neutro', 'borne-lampada-neutro']);
                    txt.innerHTML = '<span class="msg-vermelha">CONECTE O NEUTRO:</span> <span class="msg-branca">CLIQUE NA REFERÊNCIA DO BARRAMENTO</span>';
                });
            }
            else if (local === 'neutro_bar' && neutroStatus === 'desconectado') {
                neutroStatus = 'iniciado'; document.getElementById('borne-barramento-neutro').classList.add('selecionado');
                txt.innerHTML = '<span class="msg-vermelha">CONECTE O NEUTRO:</span> <span class="msg-branca">CLIQUE NA REFERÊNCIA DA LÂMPADA</span>';
            }
            else if (local === 'lamp_neu' && neutroStatus === 'iniciado') {
                neutroStatus = 'concluido'; som.play();
                document.getElementById('borne-lampada-neutro').classList.add('selecionado');
                animarFio('fio-neutro', arquivosNeutro, 0, () => { 
                    trocarPares(['borne-barramento-neutro', 'borne-lampada-neutro'], []);
                    txt.innerHTML = '<span class="msg-branca">FIAÇÃO CONCLUÍDA. LIGUE O DG, O DR E O INTERRUPTOR.</span>';
                });
            }
        }

        function atualizarEstadoLampada() {
            const imgLampada = document.getElementById('img-lampada');
            const txt = document.getElementById('status-texto');
            const painel = document.getElementById('painel-concluido');
            
            if (neutroStatus !== 'concluido') return;

            // CASO 1: TUDO LIGADO (Lâmpada Acende)
            if (dgLigado && drLigado && interLigado) {
                imgLampada.style.display = "block";
                txt.innerHTML = '<span class="pilula ligada">LAMPADA LIGADA</span>';
                jaAcedeuUmaVez = true; // Registra que o sistema funcionou
            } 
            // CASO 2: LÂMPADA FOI DESLIGADA (Após ter sido ligada uma vez)
            else if (jaAcedeuUmaVez) {
                imgLampada.style.display = "none";
                txt.innerHTML = '<span class="pilula desligada">LAMPADA DESLIGADA</span>';
                
                // Delay de 3 segundos para aparecer a placa de concluído
                setTimeout(() => {
                    painel.classList.add('mostrar');
                    
                    // Delay de mais 3 segundos para a placa sumir
                    setTimeout(() => {
                        painel.classList.remove('mostrar');
                    }, 3000);
                    
                }, 3000);
                
                jaAcedeuUmaVez = false; // Reseta para evitar loops de placa
            }
            // CASO 3: AINDA NÃO ACENDEU (Mantém instrução inicial)
            else {
                imgLampada.style.display = "none";
                if (!painel.classList.contains('mostrar')) {
                    txt.innerHTML = '<span class="msg-branca">FIAÇÃO CONCLUÍDA. LIGUE O DG, O DR E O INTERRUPTOR.</span>';
                }
            }
        }

        function animarFio(id, lista, index, callback) {
            const el = document.getElementById(id);
            if (index === 0) el.style.display = 'block';
            if (index < lista.length) {
                const pasta = id.replace('fio-', '').toUpperCase();
                el.src = `./${pasta}/${lista[index]}`;
                setTimeout(() => animarFio(id, lista, index + 1, callback), 80);
            } else if (callback) { callback(); }
        }

        function alternarDG() { dgLigado = !dgLigado; document.getElementById('img-dg').src = dgLigado ? "./al_dg_on.png" : "./al_dg_off.png"; document.getElementById('som-disjuntor').play(); atualizarEstadoLampada(); }
        function alternarDR() { drLigado = !drLigado; document.getElementById('img-dr').src = drLigado ? "./al_dr_on.png" : "./al_dr_off.png"; document.getElementById('som-disjuntor').play(); atualizarEstadoLampada(); }
        function alternarDJ16() { dj16Ligado = !dj16Ligado; document.getElementById('img-dj16').src = dj16Ligado ? "./al_dj16_on.png" : "./al_dj16_off.png"; document.getElementById('som-disjuntor').play(); }
        function alternarInterruptor() { interLigado = !interLigado; document.getElementById('img-interruptor').src = interLigado ? "./tec_int_on.png" : "./tec_int_off.png"; document.getElementById('som-interruptor').play(); atualizarEstadoLampada(); }
    </script>
</body>
</html>
