<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT Pro - Ajuste Final</title>
    <style>
        body { 
            margin: 0; 
            background-color: #0b0e14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }

        h2 { 
            color: #00ffff; 
            margin-top: 15px; 
            font-size: 18px; 
            text-shadow: 0 0 10px #00ffff; 
            text-transform: uppercase;
        }

        #quadro { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid #2c3e50; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            margin-top: 10px; 
        }

        .fundo { 
            width: 100%; 
            display: block; 
            pointer-events: none; 
        }

        .alavanca {
            position: absolute;
            z-index: 100;
            cursor: pointer;
            outline: 1px solid #00ff00; /* Borda de guia */
            display: block;
        }

        /* ============================================================
           AQUI É ONDE VOCÊ ALTERA O TAMANHO (width) E A POSIÇÃO
           ============================================================ */
        
        #img-dg { 
            width: 30px;   /* <--- ALTERE O TAMANHO AQUI */
            top: 24%;      /* <--- MOVE PARA CIMA/BAIXO */
            left: 11%;     /* <--- MOVE PARA ESQUERDA/DIREITA */
        }

        #img-dr { 
            width: 30px;   /* <--- ALTERE O TAMANHO AQUI */
            top: 24%; 
            left: 23%; 
        }

        #img-dj16 { 
            width: 20px;   /* <--- ALTERE O TAMANHO AQUI */
            top: 26%; 
            left: 32%; 
        }
        
        /* ============================================================ */

        .status-box {
            margin: 15px 0;
            padding: 10px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            border-radius: 8px;
            border: 1px solid #2c3e50;
            min-height: 35px;
        }

        #status-texto { 
            color: #ffcc00; 
            font-weight: bold; 
            font-size: 13px; 
            text-transform: uppercase;
        }

        .alerta {
            color: #ff4444 !important;
            animation: tremer 0.3s;
        }

        @keyframes tremer {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <h2>Laboratório de Comandos</h2>
    
    <div class="status-box">
        <span id="status-texto">AJUSTE O TAMANHO E A POSIÇÃO DAS ALAVANCAS</span>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">

        <img id="img-dg" src="./al_dg_off.png?v=4" class="alavanca" onclick="avisar()">
        <img id="img-dr" src="./al_dr_off.png?v=4" class="alavanca" onclick="avisar()">
        <img id="img-dj16" src="./al_dj16_off.png?v=4" class="alavanca" onclick="avisar()">
    </div>

    <audio id="som-disj" src="./disj.mp3" preload="auto"></audio>

    <script>
        function avisar() {
            const txt = document.getElementById('status-texto');
            txt.innerText = "BLOQUEADO: FINALIZE A FIAÇÃO PRIMEIRO";
            txt.classList.add('alerta');
            
            setTimeout(() => {
                txt.classList.remove('alerta');
                txt.innerText = "AJUSTE O TAMANHO E A POSIÇÃO DAS ALAVANCAS";
            }, 2000);
        }
    </script>
</body>
</html>
