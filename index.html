<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT - Simulação Completa</title>
    <style>
        body { margin: 0; background-color: #050a18; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        #titulo-geral { color: #00ffff; text-shadow: 0 0 15px #00ffff; font-size: 26px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        
        #container-instrucao {
            width: 95%; max-width: 800px; padding: 15px 20px; border: 1px solid #1a2a4a; 
            border-radius: 10px; background: rgba(5, 10, 24, 0.8); 
            margin-bottom: 25px; display: flex; justify-content: center; align-items: center; min-height: 30px;
        }
        
        #caixa-instrucao { text-align: center; font-size: 13px; font-weight: bold; text-transform: uppercase; transition: all 0.2s ease-in-out; }
        
        .status-acesa { 
            background-color: #008000; 
            color: #90ee90; 
            padding: 6px 25px; 
            border-radius: 50px; 
            box-shadow: 0 0 15px #008000;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .status-apagada { 
            background-color: #b30000; 
            color: #ffcccc; 
            padding: 6px 25px; 
            border-radius: 50px; 
            box-shadow: 0 0 15px #b30000;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .txt-laranja { color: #ff8c00; }
        .txt-verde { color: #90ee90; }
        .txt-vermelho { color: #ff3333; }
        .txt-branco { color: #ffffff; }
        .msg-conclusao { color: #ffcc00; }

        #quadro { position: relative; width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; }
        .fundo { width: 100%; display: block; border-radius: 8px; }
        .cabo { position: absolute; top: 0; left: 0; width: 100%; height: auto; display: none; pointer-events: none; }
        
        .borne {
            position: absolute; width: 12px; height: 12px;
            background: rgba(0, 255, 255, 0.4); border: 1px solid #00ffff;
            border-radius: 50%; z-index: 100; cursor: pointer; 
            transform: translate(-50%, -50%); display: none;
        }

        .interativo { position: absolute; z-index: 50; cursor: pointer; }

        #tecla-dg    { top: 25%; left: 11.2%;  width: 28px; } 
        #tecla-dr    { top: 28%; left: 23.4%; width: 28px; } 
        #tecla-dj16  { top: 24.5%; left: 31.8%; width: 21px; } 
        #tecla-int   { top: 73%; left: 72%; width:27px; }

        #lampada-acesa { 
            position: absolute; top: 47%; left: 76.3%; 
            width:118px; display: none; z-index: 45; pointer-events: none; 
        }

        #btn-reiniciar {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            padding: 4px 15px; background: #b30000;
            color: white; border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; font-size: 10px; z-index: 60;
            box-shadow: 0 4px 0 #660000, 0 6px 8px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }

        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 10, 24, 0.95); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease-out;
        }
        .splash-card {
            width: 360px; padding: 40px 20px; border: 3px solid #00ffff; border-radius: 15px;
            background: #12191b; text-align: center; box-shadow: 0 0 30px #00ffff;
        }
        .splash-card h1 { color: #00ffff; text-shadow: 0 0 10px #00ffff; font-size: 18px; margin: 0 0 15px 0; }
        .splash-card p { color: #ffffff; font-size: 13px; margin: 5px 0; }
        .splash-card .creditos { margin-top: 30px; font-size: 10px; color: #aaaaaa; border-top: 1px solid #333; padding-top: 15px; }

        #b-fase-1 { top: 38%; left: 27%; display: block; } 
        #b-fase-2 { top: 81%; left: 68%; display: block; } 
        #b-ret-1  { top: 75%; left: 68%; } 
        #b-ret-2  { top: 30%; left: 82.3%; } 
        #b-retL1-1 { top: 22.6%; left: 82.3%; } 
        #b-retL1-2 { top: 11%; left: 88%; } 
        #b-retL2-1 { top: 38%; left: 82.3%; } 
        #b-retL2-2 { top: 55.6%; left: 88.7%; } 
        #b-neuL1-1 { top: 33%; left: 44.2%; } 
        #b-neuL1-2 { top: 55.6%; left: 96%; } 
        #b-neuLigal1-1 { top: 55.6%; left: 94%; } 
        #b-neuLigal1-2 { top: 55.5%; left: 91.5%; } 
        #b-neuLigal2-1 { top: 9.9%; left: 97%; } 
        #b-neuLigal2-2 { top: 9.9%; left: 90.5%; } 
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-card">
            <h1>INTERRUPTOR SIMPLES PARA 2 LÂMPADAS</h1>
            <p>CIRCUITO MONOFÁSICO - 127V</p>
            <p>LABORATÓRIO SMT PRO</p>
            <div class="creditos">© Desenvolvido por Ivan Santos - ConectaeadPLUS - 2026</div>
        </div>
    </div>

    <div id="titulo-geral">LABORATÓRIO SMT PRO</div>

    <div id="container-instrucao">
        <div id="caixa-instrucao">
            <span class="txt-laranja">CONECTE A FASE.</span> <span class="txt-verde">CLIQUE NA REFERÊNCIA DO DR.</span>
        </div>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">
        <img id="lampada-acesa" src="./lamp_on.png">

        <img id="fio-fase" class="cabo" src="./FASE/quadro0000.png">
        <img id="fio-retorno" class="cabo" src="./RETORNO/quadro0000.png">
        <img id="fio-retornoL1" class="cabo" src="./RETORNOL1/quadro0000.png">
        <img id="fio-retornoL2" class="cabo" src="./RETORNOL2/quadro0000.png">
        <img id="fio-neutroL1" class="cabo" src="./NEUTROL1/quadro0000.png">
        <img id="fio-neuLigal1" class="cabo" src="./NEUTRO LIGAL1/quadro0000.png">
        <img id="fio-neuLigal2" class="cabo" src="./NEUTRO LIGAL2/quadro0000.png">

        <img id="tecla-dg" class="interativo" src="./al_dg_off.png" onclick="alternarDispositivo('dg', 'al')">
        <img id="tecla-dr" class="interativo" src="./al_dr_off.png" onclick="alternarDispositivo('dr', 'al')">
        <img id="tecla-dj16" class="interativo" src="./al_dj16_off.png" onclick="alternarDispositivo('dj16', 'al')">
        <img id="tecla-int" class="interativo" src="./tec_int_off.png" onclick="alternarDispositivo('int', 'tec')">

        <div id="b-fase-1" class="borne" onclick="gerenciarFluxo('fase', 1)"></div>
        <div id="b-fase-2" class="borne" onclick="gerenciarFluxo('fase', 2)"></div>
        <div id="b-ret-1" class="borne" onclick="gerenciarFluxo('ret', 1)"></div>
        <div id="b-ret-2" class="borne" onclick="gerenciarFluxo('ret', 2)"></div>
        <div id="b-retL1-1" class="borne" onclick="gerenciarFluxo('retL1', 1)"></div>
        <div id="b-retL1-2" class="borne" onclick="gerenciarFluxo('retL1', 2)"></div>
        <div id="b-retL2-1" class="borne" onclick="gerenciarFluxo('retL2', 1)"></div>
        <div id="b-retL2-2" class="borne" onclick="gerenciarFluxo('retL2', 2)"></div>
        <div id="b-neuL1-1" class="borne" onclick="gerenciarFluxo('neuL1', 1)"></div>
        <div id="b-neuL1-2" class="borne" onclick="gerenciarFluxo('neuL1', 2)"></div>
        <div id="b-neuLigal1-1" class="borne" onclick="gerenciarFluxo('neuLigal1', 1)"></div>
        <div id="b-neuLigal1-2" class="borne" onclick="gerenciarFluxo('neuLigal1', 2)"></div>
        <div id="b-neuLigal2-1" class="borne" onclick="gerenciarFluxo('neuLigal2', 1)"></div>
        <div id="b-neuLigal2-2" class="borne" onclick="gerenciarFluxo('neuLigal2', 2)"></div>

        <button id="btn-reiniciar" onclick="location.reload()">REINICIAR</button>
    </div>

    <script>
        let timerStatus;
        let instrucaoOriginal = '';

        function substituirPorStatus(texto, classe, temporario) {
            const caixa = document.getElementById('caixa-instrucao');
            
            if (!caixa.classList.contains('status-acesa') && !caixa.classList.contains('status-apagada')) {
                instrucaoOriginal = caixa.innerHTML;
            }

            clearTimeout(timerStatus);
            caixa.innerHTML = texto;
            caixa.className = ''; 
            caixa.classList.add(classe);

            if (temporario) {
                timerStatus = setTimeout(() => {
                    caixa.classList.remove(classe);
                    caixa.innerHTML = instrucaoOriginal;
                }, 3000);
            }
        }

        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }, 3500);
        };

        let statusConexao = { fase: 0, ret: 0, retL1: 0, retL2: 0, neuL1: 0, neuLigal1: 0, neuLigal2: 0 };
        let dispositivos = { dg: false, dr: false, dj16: false, int: false };
        const somDisjuntor = new Audio('./disj.mp3');
        const somInterruptor = new Audio('./int.mp3');
        const somConexao = new Audio('./conexao.mp3');

        function atualizarLuz() {
            const fiacaoCompleta = (statusConexao.neuLigal2 === 2);
            const energiaDisponivel = dispositivos.dg && dispositivos.dr;
            const lampada = document.getElementById('lampada-acesa');
            const estadoAnterior = lampada.style.display === 'block';
            const novoEstado = fiacaoCompleta && energiaDisponivel && dispositivos.int;

            if (novoEstado) {
                lampada.style.display = 'block';
                if (!estadoAnterior) substituirPorStatus("LÂMPADA ACESA", "status-acesa", false);
            } else {
                lampada.style.display = 'none';
                if (estadoAnterior) substituirPorStatus("LÂMPADA APAGADA", "status-apagada", true);
            }
        }

        function alternarDispositivo(id, prefixo) {
            dispositivos[id] = !dispositivos[id];
            const img = document.getElementById(`tecla-${id}`);
            img.src = `./${prefixo}_${id}_${dispositivos[id] ? 'on' : 'off'}.png`;
            if (['dg', 'dr', 'dj16'].includes(id)) { somDisjuntor.currentTime = 0; somDisjuntor.play(); }
            else { somInterruptor.currentTime = 0; somInterruptor.play(); }
            atualizarLuz();
        }

        function gerenciarFluxo(cabo, ponto) {
            somConexao.currentTime = 0; somConexao.play();
            const caixaMsg = document.getElementById('caixa-instrucao');
            const proximoCabo = { 'fase': 'ret', 'ret': 'retL1', 'retL1': 'retL2', 'retL2': 'neuL1', 'neuL1': 'neuLigal1', 'neuLigal1': 'neuLigal2' };
            const mensagensProximo = {
                'fase': '<span class="txt-vermelho">CONECTE O RETORNO:</span> <span class="txt-branco">CLIQUE NA REFERÊNCIA DO INTERRUPTOR.</span>',
                'ret': '<span class="txt-vermelho">CONECTE O RETORNO DA LÂMPADA:</span> <span class="txt-branco">CLIQUE NO FIO E NA LÂMPADA L1</span>',
                'retL1': '<span class="txt-vermelho">CONECTE O RETORNO DA LAMPADA:</span> <span class="txt-branco">CLIQUE NO FIO E NA LÂMPADA L2</span>',
                'retL2': '<span class="txt-vermelho">CONECTE O NEUTRO:</span> <span class="txt-branco">CLIQUE NA REFERÊNCIA DO BARRAMENTO DE NEUTRO</span>',
                'neuL1': '<span class="txt-vermelho">CONECTE O NEUTRO:</span> <span class="txt-branco">CLIQUE NO FIO E NA LÂMPADA L1.</span>',
                'neuLigal1': '<span class="txt-vermelho">CONECTE O NEUTRO:</span> <span class="txt-branco">CLIQUE NO FIO E NA LÂMPADA L1.</span>',
                'neuLigal2': '<span class="msg-conclusao">FIAÇÃO CONCLUÍDA! LIGUE OS DISJUNTORES E O INTERRUPTOR.</span>'
            };

            if (ponto === 1) {
                statusConexao[cabo] = 1;
                let textoAcao = (cabo === 'fase') ? "CLIQUE NA REFERÊNCIA DO INTERRUPTOR." : (cabo === 'ret') ? "CLIQUE NA REFERÊNCIA PRÓXIMA À LÂMPADA L1." : (cabo === 'retL1') ? "CLIQUE NO FIO E NA LÂMPADA L1." : (cabo === 'retL2') ? "CLIQUE NO FIO E NA LÂMPADA L2." : (cabo === 'neuL1') ? "CLIQUE NA REFERÊNCIA PRÓXIMA ÀS LÂMPADAS." : (cabo === 'neuLigal1') ? "CLIQUE NO FIO E NA LÂMPADA L1." : "CLIQUE NO FIO E NA LÂMPADA L2.";
                caixaMsg.innerHTML = `<span class="txt-laranja">${(cabo.includes('neu')) ? "CONECTE O NEUTRO:" : (cabo.includes('ret')) ? "CONECTE O RETORNO:" : "CONECTE A FASE:"}</span> <span class="txt-verde">${textoAcao}</span>`;
            } else if (ponto === 2 && statusConexao[cabo] === 1) {
                const config = { 'fase': { pasta: './FASE/', id: 'fio-fase', frames: 30 }, 'ret': { pasta: './RETORNO/', id: 'fio-retorno', frames: 36 }, 'retL1': { pasta: './RETORNOL1/', id: 'fio-retornoL1', frames: 6 }, 'retL2': { pasta: './RETORNOL2/', id: 'fio-retornoL2', frames: 12 }, 'neuL1': { pasta: './NEUTROL1/', id: 'fio-neutroL1', frames: 96 }, 'neuLigal1': { pasta: './NEUTRO LIGAL1/', id: 'fio-neuLigal1', frames: 6 }, 'neuLigal2': { pasta: './NEUTRO LIGAL2/', id: 'fio-neuLigal2', frames: 6 } };
                const c = config[cabo];
                document.getElementById(`b-${cabo}-1`).style.display = 'none';
                document.getElementById(`b-${cabo}-2`).style.display = 'none';
                dispararAnimacao(c.pasta, c.id, c.frames, cabo, proximoCabo);
                statusConexao[cabo] = 2;
                caixaMsg.innerHTML = mensagensProximo[cabo];
            }
        }

        function dispararAnimacao(caminho, idElemento, frameMax, caboNome, proximoCabo) {
            const img = document.getElementById(idElemento);
            img.style.display = 'block';
            let frameAtual = 0;
            const timer = setInterval(() => {
                if (frameAtual >= frameMax) {
                    img.src = caminho + "quadro" + String(frameMax).padStart(4, '0') + ".png";
                    clearInterval(timer);
                    const prox = proximoCabo[caboNome];
                    if(prox) { document.getElementById(`b-${prox}-1`).style.display = 'block'; document.getElementById(`b-${prox}-2`).style.display = 'block'; }
                    atualizarLuz(); return;
                }
                img.src = caminho + "quadro" + String(frameAtual).padStart(4, '0') + ".png";
                frameAtual += 6; 
            }, 80);
        }
    </script>
</body>
</html>
