<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Pro - Treinamento de Conexão</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --borne-size: 14px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #canvas-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #fff;
            border: 2px solid var(--primary-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 20px;
            overflow: hidden;
        }

        .borne {
            position: absolute;
            width: var(--borne-size);
            height: var(--borne-size);
            background-color: #34495e;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transform: translate(-50%, -50%); /* Centraliza exatamente na coordenada */
            border: 2px solid #fff;
            transition: transform 0.2s;
            display: block !important; /* Garante visibilidade */
        }

        .borne:hover {
            background-color: var(--accent-color);
            transform: translate(-50%, -50%) scale(1.3);
        }

        .borne.selected {
            background-color: #27ae60;
            box-shadow: 0 0 10px #27ae60;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #info-panel {
            margin-top: 20px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            width: 780px;
            text-align: center;
            border-left: 5px solid var(--accent-color);
        }
    </style>
</head>
<body>

    <div id="info-panel">
        <strong>Status:</strong> <span id="status-text">Selecione o primeiro borne para iniciar a conexão.</span>
    </div>

    <div id="canvas-container" id="container">
        <svg id="connection-svg"></svg>
        
        <div class="borne" id="F1" style="left: 100px; top: 100px;" title="Fase 1"></div>
        <div class="borne" id="F2" style="left: 100px; top: 150px;" title="Fase 2"></div>
        <div class="borne" id="N" style="left: 100px; top: 200px;" title="Neutro"></div>
        
        <div class="borne" id="S1_A" style="left: 400px; top: 300px;" title="Interruptor 1 - Entrada"></div>
        <div class="borne" id="S1_B" style="left: 400px; top: 350px;" title="Interruptor 1 - Saída"></div>
        
        <div class="borne" id="L1_A" style="left: 600px; top: 100px;" title="Lâmpada 1 - Ponto A"></div>
        <div class="borne" id="L1_B" style="left: 600px; top: 150px;" title="Lâmpada 1 - Ponto B"></div>
    </div>

    <script>
        const bornes = document.querySelectorAll('.borne');
        const svg = document.getElementById('connection-svg');
        const statusText = document.getElementById('status-text');
        
        let firstSelected = null;

        bornes.forEach(borne => {
            borne.addEventListener('click', () => {
                if (!firstSelected) {
                    // Primeiro clique
                    firstSelected = borne;
                    borne.classList.add('selected');
                    statusText.innerText = `Conectando de ${borne.id}... Selecione o destino.`;
                } else {
                    // Segundo clique
                    if (firstSelected === borne) {
                        // Cancelar seleção
                        resetSelection();
                        return;
                    }

                    createConnection(firstSelected, borne);
                    resetSelection();
                }
            });
        });

        function createConnection(start, end) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            
            // Pega as coordenadas exatas dos elementos
            const x1 = start.offsetLeft;
            const y1 = start.offsetTop;
            const x2 = end.offsetLeft;
            const y2 = end.offsetTop;

            line.setAttribute("x1", x1);
            line.setAttribute("y1", y1);
            line.setAttribute("x2", x2);
            line.setAttribute("y2", y2);
            line.setAttribute("stroke", "#e67e22");
            line.setAttribute("stroke-width", "3");
            
            svg.appendChild(line);
            statusText.innerText = `Conexão realizada: ${start.id} ↔ ${end.id}`;
        }

        function resetSelection() {
            if (firstSelected) {
                firstSelected.classList.remove('selected');
                firstSelected = null;
            }
            if (statusText.innerText.includes('Conectando')) {
                statusText.innerText = "Selecione o primeiro borne para iniciar a conexão.";
            }
        }
    </script>
</body>
</html>
