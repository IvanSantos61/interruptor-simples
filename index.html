<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT Pro - Fiação Completa</title>
    <style>
        body { 
            margin: 0; 
            background-color: #0b0e14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }

        h2 { 
            color: #00ffff; 
            margin-top: 15px; 
            font-size: 18px; 
            text-shadow: 0 0 10px #00ffff; 
            text-transform: uppercase;
        }

        #quadro { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid #2c3e50; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            margin-top: 10px; 
        }

        .fundo { 
            width: 100%; 
            display: block; 
            pointer-events: none; 
        }

        .alavanca {
            position: absolute;
            z-index: 100;
            cursor: pointer;
            display: block;
        }

        #img-dg { width: 28.5px; top: 25%; left: 11.2%; }
        #img-dr { width: 30px; top: 27.8%; left: 23%; }
        #img-dj16 { width: 20px; top: 26%; left: 32.2%; }

        .fio {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 40; 
            display: none; 
            pointer-events: none;
        }

        /* --- BOLINHAS DE CONEXÃO (DIMINUÍDAS) --- */
        .borne {
            position: absolute;
            width: 12px;  /* Tamanho reduzido */
            height: 12px; /* Tamanho reduzido */
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.6);
            border-radius: 50%;
            z-index: 150;
            cursor: pointer;
            transform: translate(-50%, -50%); /* Centraliza no ponto exato */
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.4);
        }

        .borne:hover { 
            background: rgba(0, 255, 255, 0.5); 
            border: 1px solid #00ffff; 
        }

        /* Ajuste as posições conforme sua imagem */
        #borne-dj16-saida { top: 35%; left: 33%; } 
        #borne-inter-entrada { top: 75%; left: 65%; } 
        #borne-inter-saida { top: 75%; left: 75%; }   
        #borne-lampada-entrada { top: 15%; left: 80%; }

        .status-box {
            margin: 15px 0;
            padding: 10px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            border-radius: 8px;
            border: 1px solid #2c3e50;
            min-height: 35px;
        }

        #status-texto { 
            color: #ffcc00; 
            font-weight: bold; 
            font-size: 13px; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h2>Laboratório SMT Pro</h2>
    
    <div class="status-box">
        <span id="status-texto">CONECTE A FASE: DJ16 -> INTERRUPTOR</span>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">

        <img id="fio-fase" src="./FASE/quadro0000.png" class="fio">
        <img id="fio-retorno" src="./RETORNO/quadro0000.png" class="fio">

        <img id="img-dg" src="./al_dg_off.png" class="alavanca" onclick="bloqueio()">
        <img id="img-dr" src="./al_dr_off.png" class="alavanca" onclick="bloqueio()">
        <img id="img-dj16" src="./al_dj16_off.png" class="alavanca" onclick="bloqueio()">

        <div id="borne-dj16-saida" class="borne" onclick="cliqueBorne('dj16')"></div>
        <div id="borne-inter-entrada" class="borne" onclick="cliqueBorne('inter_in')"></div>
        <div id="borne-inter-saida" class="borne" onclick="cliqueBorne('inter_out')"></div>
        <div id="borne-lampada-entrada" class="borne" onclick="cliqueBorne('lamp')"></div>
    </div>

    <audio id="som-conexao" src="./conexão.mp3" preload="auto"></audio>

    <script>
        let faseStatus = 'desconectado';
        let retornoStatus = 'desconectado';
        
        const arquivosFase = ["quadro0000.png", "quadro0006.png", "quadro0012.png", "quadro0018.png", "quadro0024.png", "quadro0030.png"];
        const arquivosRetorno = ["quadro0000.png", "quadro0006.png", "quadro0012.png", "quadro0018.png", "quadro0024.png", "quadro0030.png", "quadro0036.png"];

        function animarFase(index) {
            const el = document.getElementById('fio-fase');
            el.style.display = 'block';
            if (index < arquivosFase.length) {
                el.src = `./FASE/${arquivosFase[index]}`;
                setTimeout(() => animarFase(index + 1), 100);
            }
        }

        function animarRetorno(index) {
            const el = document.getElementById('fio-retorno');
            el.style.display = 'block';
            if (index < arquivosRetorno.length) {
                el.src = `./RETORNO/${arquivosRetorno[index]}`;
                setTimeout(() => animarRetorno(index + 1), 100);
            }
        }

        function cliqueBorne(local) {
            const txt = document.getElementById('status-texto');
            const som = document.getElementById('som-conexao');

            if (local === 'dj16' && faseStatus === 'desconectado') {
                faseStatus = 'iniciado';
                if(som) som.play();
                txt.innerText = "FASE: SAÍDA CONECTADA. VÁ AO INTERRUPTOR.";
            } 
            else if (local === 'inter_in' && faseStatus === 'iniciado') {
                faseStatus = 'concluido';
                if(som) som.play();
                animarFase(0);
                txt.innerText = "FASE OK! CONECTE O RETORNO: INTERRUPTOR -> LÂMPADA.";
                txt.style.color = "#00ffff";
            } 
            else if (local === 'inter_out' && faseStatus === 'concluido' && retornoStatus === 'desconectado') {
                retornoStatus = 'iniciado';
                if(som) som.play();
                txt.innerText = "RETORNO: SAÍDA CONECTADA. VÁ ATÉ A LÂMPADA.";
            }
            else if (local === 'lamp' && retornoStatus === 'iniciado') {
                retornoStatus = 'concluido';
                if(som) som.play();
                animarRetorno(0);
                txt.innerText = "RETORNO CONECTADO! AGORA O NEUTRO.";
                txt.style.color = "#00ff00";
            }
            else if (faseStatus !== 'concluido' && (local === 'inter_out' || local === 'lamp')) {
                txt.innerText = "ERRO: CONECTE A FASE PRIMEIRO!";
                txt.style.color = "#ff4444";
            }
        }

        function bloqueio() {
            const txt = document.getElementById('status-texto');
            txt.innerText = "ALAVANCA TRAVADA: FIAÇÃO INCOMPLETA!";
            txt.style.color = "#ff4444";
        }
    </script>
</body>
</html>
