<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT Pro - Laboratório</title>
    <style>
        body { margin: 0; background-color: #050a18; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; overflow: hidden; }
        h2 { color: #00ffff; margin-top: 15px; font-size: 20px; text-shadow: 0 0 10px #00ffff; text-transform: uppercase; }
        
        /* Container das mensagens de status no topo */
        .status-container { margin: 10px 0; width: 95%; max-width: 600px; height: 65px; display: flex; justify-content: center; align-items: center; }
        
        .status-botao { 
            padding: 12px 45px; border-radius: 35px; font-weight: 900; text-transform: uppercase; 
            font-size: 15px; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: none; border: 3px solid rgba(255,255,255,0.2);
        }
        .status-acesa { background: linear-gradient(to bottom, #00e600, #006400); color: white; }
        .status-apagada { background: linear-gradient(to bottom, #e60000, #800000); color: white; }

        /* Painel Concluído (concluido2.png) */
        #painel-concluido {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7);
            width: 320px; height: 170px; background: #1a1a1a; border: 4px solid #333; border-radius: 15px;
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9); opacity: 0; visibility: hidden; transition: all 0.5s;
        }
        #painel-concluido.mostrar { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .parafuso { position: absolute; width: 12px; height: 12px; background: #444; border-radius: 50%; border: 2px solid #222; }
        .p-tl { top: 10px; left: 10px; } .p-tr { top: 10px; right: 10px; }
        .p-bl { bottom: 10px; left: 10px; } .p-br { bottom: 10px; right: 10px; }
        #check-concluido { color: #00ff00; font-size: 60px; font-weight: bold; }
        #texto-concluido { color: #00ff00; font-size: 24px; font-weight: 900; }

        /* Quadro */
        #quadro { position: relative; width: 100%; max-width: 550px; background: #000; }
        .fundo { width: 100%; display: block; }
        .alavanca, .tecla, .lampada { position: absolute; z-index: 100; cursor: pointer; }
        #img-dg { width: 30px; top: 25%; left: 11%; }
        #img-dr { width: 34px; top: 27.8%; left: 23%; }
        #img-dj16 { width: 22px; top: 25%; left: 32%; }
        #img-interruptor { width: 32px; top: 72.4%; left: 72%; }
        #img-lampada { width: 130px; top: 46.8%; left: 76%; display: none; }
        .fio { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 40; display: none; }
        
        .borne { position: absolute; width: 18px; height: 18px; background: rgba(0,255,255,0.3); border: 2px solid #00ffff; border-radius: 50%; z-index: 150; transform: translate(-50%, -50%); display: none; cursor: pointer; }
        .borne.ativo { display: block; }
        .borne.selecionado { background: #00ff00; border-color: #fff; }

        #btn-reiniciar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); padding: 6px 20px; background: #cc0000; border: none; color: white; cursor: pointer; border-radius: 5px; z-index: 200; font-weight: bold; }
    </style>
</head>
<body>

    <h2>LABORATÓRIO SMT PRO</h2>
    
    <div class="status-container">
        <!-- As mensagens de status (Lacesa.png e lapagada.png) -->
        <div id="status-acesa" class="status-botao status-acesa">LÂMPADA ACESA</div>
        <div id="status-apagada" class="status-botao status-apagada">LÂMPADA APAGADA</div>
    </div>

    <div id="painel-concluido">
        <div class="parafuso p-tl"></div><div class="parafuso p-tr"></div>
        <div class="parafuso p-bl"></div><div class="parafuso p-br"></div>
        <div id="check-concluido">✓</div>
        <div id="texto-concluido">CONCLUÍDO</div>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">
        <img id="fio-FASE" src="./FASE/quadro0000.png" class="fio">
        <img id="fio-RETORNO" src="./RETORNO/quadro0000.png" class="fio">
        <img id="fio-NEUTRO" src="./NEUTRO/quadro0000.png" class="fio">

        <img id="img-dg" src="./al_dg_off.png" class="alavanca" onclick="controlarEnergia('dg')">
        <img id="img-dr" src="./al_dr_off.png" class="alavanca" onclick="controlarEnergia('dr')">
        <img id="img-dj16" src="./al_dj16_off.png" class="alavanca" onclick="controlarEnergia('dj16')">
        <img id="img-interruptor" src="./tec_int_off.png" class="tecla" onclick="controlarEnergia('int')">
        <img id="img-lampada" src="./lamp_on.png" class="lampada">

        <!-- Bornes de fiação -->
        <div id="b1" class="borne ativo" onclick="fiar(1)"></div>
        <div id="b2" class="borne ativo" onclick="fiar(2)"></div>
        <div id="b3" class="borne" onclick="fiar(3)"></div>
        <div id="b4" class="borne" onclick="fiar(4)"></div>
        <div id="b5" class="borne" onclick="fiar(5)"></div>
        <div id="b6" class="borne" onclick="fiar(6)"></div>

        <button id="btn-reiniciar" onclick="location.reload()">REINICIAR</button>
    </div>

    <script>
        let progresso = 0; 
        let dg = false, dr = false, dj = false, interruptor = false;
        let fiaçãoPronta = false;
        let jaLigou = false; // Controla se a lâmpada já foi acesa pelo menos uma vez

        // Som de erro caso clique fora da sequência
        const somErro = new Audio('./erro.mp3');

        function fiar(passo) {
            if (passo === 1 && progresso === 0) { progresso = 1; document.getElementById('b1').classList.add('selecionado'); }
            else if (passo === 2 && progresso === 1) { 
                progresso = 2; document.getElementById('b2').classList.add('selecionado');
                new Audio('./conexão.mp3').play();
                animarFio('fio-FASE', 6, () => { document.getElementById('b3').classList.add('ativo'); document.getElementById('b4').classList.add('ativo'); });
            }
            else if (passo === 3 && progresso === 2) { progresso = 3; document.getElementById('b3').classList.add('selecionado'); }
            else if (passo === 4 && progresso === 3) { 
                progresso = 4; document.getElementById('b4').classList.add('selecionado');
                new Audio('./conexão.mp3').play();
                animarFio('fio-RETORNO', 7, () => { document.getElementById('b5').classList.add('ativo'); document.getElementById('b6').classList.add('ativo'); });
            }
            else if (passo === 5 && progresso === 4) { progresso = 5; document.getElementById('b5').classList.add('selecionado'); }
            else if (passo === 6 && progresso === 5) { 
                progresso = 6; document.getElementById('b6').classList.add('selecionado');
                new Audio('./conexão.mp3').play();
                animarFio('fio-NEUTRO', 14, () => { fiaçãoPronta = true; });
            } else { somErro.play(); }
        }

        function animarFio(id, total, cb) {
            let i = 0; const el = document.getElementById(id); el.style.display = 'block';
            const pasta = id.split('-')[1];
            const intervalo = setInterval(() => {
                const num = String(i * 6).padStart(4, '0');
                el.src = `./${pasta}/quadro${num}.png`;
                if (i >= total) { clearInterval(intervalo); cb(); } i++;
            }, 50);
        }

        function controlarEnergia(tipo) {
            if (!fiaçãoPronta) return;
            new Audio(tipo === 'int' ? './int.mp3' : './disj.mp3').play();

            if (tipo === 'dg') dg = !dg;
            if (tipo === 'dr' && dg) dr = !dr;
            if (tipo === 'dj16' && dr) dj = !dj;
            if (tipo === 'int') interruptor = !interruptor;

            // Atualiza imagens
            document.getElementById('img-dg').src = dg ? './al_dg_on.png' : './al_dg_off.png';
            document.getElementById('img-dr').src = dr ? './al_dr_on.png' : './al_dr_off.png';
            document.getElementById('img-dj16').src = dj ? './al_dj16_on.png' : './al_dj16_off.png';
            document.getElementById('img-interruptor').src = interruptor ? './tec_int_on.png' : './tec_int_off.png';

            const temLuz = dg && dr && dj && interruptor;
            const lamp = document.getElementById('img-lampada');
            const msgAcesa = document.getElementById('status-acesa');
            const msgApagada = document.getElementById('status-apagada');

            if (temLuz) {
                lamp.style.display = 'block';
                msgAcesa.style.display = 'block';
                msgApagada.style.display = 'none';
                jaLigou = true; 
            } else {
                lamp.style.display = 'none';
                msgAcesa.style.display = 'none';
                
                // SÓ mostra "LÂMPADA APAGADA" se ela já tiver sido ligada antes
                if (jaLigou && !interruptor) {
                    msgApagada.style.display = 'block';
                    
                    // Lógica dos 3 segundos para o CONCLUÍDO
                    setTimeout(() => {
                        const painel = document.getElementById('painel-concluido');
                        painel.classList.add('mostrar');
                        
                        // Some após 3 segundos, mas mantém o "LÂMPADA APAGADA"
                        setTimeout(() => {
                            painel.classList.remove('mostrar');
                        }, 3000);
                    }, 3000);
                    
                    jaLigou = false; // Reseta para o próximo teste se quiser
                }
            }
        }
    </script>
</body>
</html>
