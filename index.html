<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT - Simulação Completa</title>
    <style>
        body { margin: 0; background-color: #050a18; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        #titulo-geral { color: #00ffff; text-shadow: 0 0 15px #00ffff; font-size: 26px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        
        #container-instrucao {
            width: 95%; max-width: 800px; padding: 15px 20px; border: 1px solid #1a2a4a; 
            border-radius: 10px; background: rgba(5, 10, 24, 0.8); 
            margin-bottom: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 40px;
            position: relative;
        }
        
        #caixa-instrucao { text-align: center; font-size: 13px; font-weight: bold; text-transform: uppercase; transition: all 0.2s ease-in-out; }
        
        /* Nova mensagem de conclusão separada */
        #msg-concluido-separada {
            display: none;
            color: #ffcc00;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 8px;
            text-shadow: 0 0 10px #ffcc00;
        }

        /* Estilos das Pílulas */
        .status-acesa { 
            background-color: #008000; color: #90ee90; padding: 6px 25px; border-radius: 50px; 
            box-shadow: 0 0 15px #008000; display: inline-block; border: 1px solid rgba(255,255,255,0.2);
        }

        .status-apagada { 
            background-color: #b30000; color: #ffcccc; padding: 6px 25px; border-radius: 50px; 
            box-shadow: 0 0 15px #b30000; display: inline-block; border: 1px solid rgba(255,255,255,0.2);
        }

        .txt-laranja { color: #ff8c00; }
        .txt-verde { color: #90ee90; }
        .txt-vermelho { color: #ff3333; }
        .txt-branco { color: #ffffff; }

        #quadro { position: relative; width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; }
        .fundo { width: 100%; display: block; border-radius: 8px; }
        .cabo { position: absolute; top: 0; left: 0; width: 100%; height: auto; display: none; pointer-events: none; }
        
        .borne { position: absolute; width: 12px; height: 12px; background: rgba(0, 255, 255, 0.4); border: 1px solid #00ffff; border-radius: 50%; z-index: 100; cursor: pointer; transform: translate(-50%, -50%); display: none; }
        .interativo { position: absolute; z-index: 50; cursor: pointer; }

        #tecla-dg    { top: 25%; left: 11.2%;  width: 28px; } 
        #tecla-dr    { top: 28%; left: 23.4%; width: 28px; } 
        #tecla-dj16  { top: 24.5%; left: 31.8%; width: 21px; } 
        #tecla-int   { top: 73%; left: 72%; width:27px; }
        #lampada-acesa { position: absolute; top: 47%; left: 76.3%; width:118px; display: none; z-index: 45; pointer-events: none; }

        #btn-reiniciar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); padding: 4px 15px; background: #b30000; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 10px; z-index: 60; box-shadow: 0 4px 0 #660000; }

        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 10, 24, 0.95); z-index: 2000; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease-out; }
        .splash-card { width: 360px; padding: 40px 20px; border: 3px solid #00ffff; border-radius: 15px; background: #12191b; text-align: center; box-shadow: 0 0 30px #00ffff; }
        .splash-card h1 { color: #00ffff; font-size: 18px; margin: 0 0 15px 0; }
        .splash-card p { color: #ffffff; font-size: 13px; }

        #b-fase-1 { top: 38%; left: 27%; display: block; } 
        #b-fase-2 { top: 81%; left: 68%; display: block; } 
        /* Outros bornes seguem a mesma lógica anterior... */
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-card">
            <h1>INTERRUPTOR SIMPLES PARA 2 LÂMPADAS</h1>
            <p>LABORATÓRIO SMT PRO</p>
            <div style="margin-top: 30px; font-size: 10px; color: #aaaaaa;">© Desenvolvido por Ivan Santos - 2026</div>
        </div>
    </div>

    <div id="titulo-geral">LABORATÓRIO SMT PRO</div>

    <div id="container-instrucao">
        <div id="caixa-instrucao">
            <span class="txt-laranja">CONECTE A FASE.</span> <span class="txt-verde">CLIQUE NA REFERÊNCIA DO DR.</span>
        </div>
        <!-- Mensagem Concluido que aparece separada -->
        <div id="msg-concluido-separada">CONCLUÍDO</div>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">
        <img id="lampada-acesa" src="./lamp_on.png">

        <!-- Cabos -->
        <img id="fio-fase" class="cabo" src="./FASE/quadro0000.png">
        <img id="fio-retorno" class="cabo" src="./RETORNO/quadro0000.png">
        <img id="fio-retornoL1" class="cabo" src="./RETORNOL1/quadro0000.png">
        <img id="fio-retornoL2" class="cabo" src="./RETORNOL2/quadro0000.png">
        <img id="fio-neutroL1" class="cabo" src="./NEUTROL1/quadro0000.png">
        <img id="fio-neuLigal1" class="cabo" src="./NEUTRO LIGAL1/quadro0000.png">
        <img id="fio-neuLigal2" class="cabo" src="./NEUTRO LIGAL2/quadro0000.png">

        <img id="tecla-dg" class="interativo" src="./al_dg_off.png" onclick="alternarDispositivo('dg', 'al')">
        <img id="tecla-dr" class="interativo" src="./al_dr_off.png" onclick="alternarDispositivo('dr', 'al')">
        <img id="tecla-dj16" class="interativo" src="./al_dj16_off.png" onclick="alternarDispositivo('dj16', 'al')">
        <img id="tecla-int" class="interativo" src="./tec_int_off.png" onclick="alternarDispositivo('int', 'tec')">

        <div id="b-fase-1" class="borne" onclick="gerenciarFluxo('fase', 1)"></div>
        <div id="b-fase-2" class="borne" onclick="gerenciarFluxo('fase', 2)"></div>
        <!-- Os outros bornes devem ser mantidos conforme o código original -->

        <button id="btn-reiniciar" onclick="location.reload()">REINICIAR</button>
    </div>

    <script>
        let timerStatus;
        let timerConcluido;
        let instrucaoOriginal = '';

        function substituirPorStatus(texto, classe, temporario) {
            const caixa = document.getElementById('caixa-instrucao');
            const msgConcluido = document.getElementById('msg-concluido-separada');
            
            if (!caixa.classList.contains('status-acesa') && !caixa.classList.contains('status-apagada')) {
                instrucaoOriginal = caixa.innerHTML;
            }

            clearTimeout(timerStatus);
            clearTimeout(timerConcluido);
            
            caixa.innerHTML = texto;
            caixa.className = ''; 
            caixa.classList.add(classe);

            // Lógica específica: Se for LÂMPADA APAGADA, mostra o CONCLUÍDO separado
            if (texto === "LÂMPADA APAGADA") {
                msgConcluido.style.display = 'block';
            } else {
                msgConcluido.style.display = 'none';
            }

            if (temporario) {
                timerStatus = setTimeout(() => {
                    caixa.classList.remove(classe);
                    caixa.innerHTML = instrucaoOriginal;
                    msgConcluido.style.display = 'none'; // Some junto com o status
                }, 3000);
            }
        }

        // Funções de controle de dispositivos e luz
        let statusConexao = { fase: 0, ret: 0, retL1: 0, retL2: 0, neuL1: 0, neuLigal1: 0, neuLigal2: 0 };
        let dispositivos = { dg: false, dr: false, dj16: false, int: false };

        function atualizarLuz() {
            const fiacaoCompleta = (statusConexao.neuLigal2 === 2);
            const energiaDisponivel = dispositivos.dg && dispositivos.dr;
            const lampada = document.getElementById('lampada-acesa');
            const estadoAnterior = lampada.style.display === 'block';
            const novoEstado = fiacaoCompleta && energiaDisponivel && dispositivos.int;

            if (novoEstado) {
                lampada.style.display = 'block';
                if (!estadoAnterior) substituirPorStatus("LÂMPADA ACESA", "status-acesa", false);
            } else {
                lampada.style.display = 'none';
                if (estadoAnterior) substituirPorStatus("LÂMPADA APAGADA", "status-apagada", true);
            }
        }

        function alternarDispositivo(id, prefixo) {
            dispositivos[id] = !dispositivos[id];
            const img = document.getElementById(`tecla-${id}`);
            img.src = `./${prefixo}_${id}_${dispositivos[id] ? 'on' : 'off'}.png`;
            atualizarLuz();
        }

        // O restante das funções gerenciarFluxo e dispararAnimacao devem ser mantidas do código anterior
        // para garantir o funcionamento dos cabos e bornes.
        
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }, 1000);
        };
    </script>
</body>
</html>
