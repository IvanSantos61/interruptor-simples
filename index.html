<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT Pro - Laboratório Interativo</title>
    <style>
        body { 
            margin: 0; 
            background-color: #0b0e14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }

        h2 { 
            color: #00ffff; 
            margin-top: 15px; 
            font-size: 18px; 
            text-shadow: 0 0 10px #00ffff; 
            text-transform: uppercase;
        }

        #quadro { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid #2c3e50; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            margin-top: 10px; 
        }

        .fundo { 
            width: 100%; 
            display: block; 
            pointer-events: none; 
            -webkit-user-drag: none;
        }

        /* IMAGENS DAS ALAVANCAS (ESTADO INICIAL OFF) */
        .alavanca {
            position: absolute;
            z-index: 50;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* Posicionamento - Ajuste conforme sua imagem AMBIENTE.jpg */
        #img-dg { width: 45px; top: 20%; left: 15%; }
        #img-dr { width: 45px; top: 20%; left: 30%; }
        #img-dj16 { width: 40px; top: 20%; left: 45%; }

        .status-box {
            margin: 15px 0;
            padding: 10px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            border: 1px solid #2c3e50;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #status-texto { 
            color: #ffcc00; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-size: 14px; 
        }

        /* Alerta de tentativa bloqueada */
        .alerta-erro {
            color: #ff4444 !important;
            animation: tremer 0.3s;
        }

        @keyframes tremer {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <h2>Laboratório de Comandos</h2>
    
    <div class="status-box">
        <span id="status-texto">FINALIZE A MONTAGEM DO CIRCUITO PRIMEIRO</span>
    </div>

    <div id="quadro">
        <img src="AMBIENTE.jpg" class="fundo">

        <img id="img-dg" src="AL_DG_OFF.png" class="alavanca" onclick="tentarAcionar('Geral')">
        <img id="img-dr" src="AL_DR_OFF.png" class="alavanca" onclick="tentarAcionar('DR')">
        <img id="img-dj16" src="AL_DJ16_OFF.png" class="alavanca" onclick="tentarAcionar('Circuito')">
    </div>

    <audio id="som-disj" src="disj.mp3" preload="auto"></audio>

    <script>
        // Premissa: O circuito começa NÃO finalizado
        let circuitoFinalizado = false; 

        function tentarAcionar(nomeComponente) {
            const txt = document.getElementById('status-texto');
            const som = document.getElementById('som-disj');

            if (!circuitoFinalizado) {
                // Toca som de erro ou apenas impede a ação
                txt.innerText = "BLOQUEADO: FINALIZE A FIAÇÃO DO " + nomeComponente.toUpperCase();
                txt.classList.add('alerta-erro');
                
                // Remove a cor de erro após 2 segundos
                setTimeout(() => {
                    txt.classList.remove('alerta-erro');
                    txt.innerText = "FINALIZE A MONTAGEM DO CIRCUITO PRIMEIRO";
                }, 2000);
                
                return;
            }

            // Lógica de acionamento real (será ativada quando circuitoFinalizado = true)
            som.play();
            console.log(nomeComponente + " acionado!");
        }
    </script>
</body>
</html>
