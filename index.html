<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT - Simulação Estável</title>
    <style>
        body { margin: 0; background-color: #050a18; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        #container-instrucao {
            width: 95%; max-width: 800px; padding: 15px; border: 1px solid #1a2a4a; 
            border-radius: 10px; background: rgba(5, 10, 24, 0.9); 
            margin-bottom: 10px; display: flex; justify-content: center; align-items: center; min-height: 50px;
        }
        
        #caixa-instrucao { text-align: center; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        
        .status-acesa { 
            background-color: #008000; color: #90ee90; padding: 6px 25px; border-radius: 50px; 
            box-shadow: 0 0 15px #008000; display: inline-block; border: 1px solid rgba(255,255,255,0.2);
        }

        .status-apagada { 
            background-color: #b30000; color: #ffcccc; padding: 6px 25px; border-radius: 50px; 
            box-shadow: 0 0 15px #b30000; display: inline-block; border: 1px solid rgba(255,255,255,0.2);
        }

        #quadro { position: relative; width: 100%; max-width: 500px; }
        .fundo { width: 100%; display: block; border-radius: 8px; }
        .interativo { position: absolute; z-index: 50; cursor: pointer; }
        #tecla-int { top: 73%; left: 72%; width:27px; }
        #lampada-acesa { position: absolute; top: 47%; left: 76.3%; width:118px; display: none; z-index: 45; pointer-events: none; }
    </style>
</head>
<body>

    <div id="container-instrucao">
        <div id="caixa-instrucao">
            <span style="color: #ffcc00;">FIAÇÃO CONCLUÍDA! LIGUE O INTERRUPTOR.</span>
        </div>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">
        <img id="lampada-acesa" src="./lamp_on.png">
        <img id="tecla-int" class="interativo" src="./tec_int_off.png" onclick="alternarInterruptor()">
    </div>

    <script>
        let interLigado = false;

        function alternarInterruptor() {
            interLigado = !interLigado;
            const img = document.getElementById('tecla-int');
            const lamp = document.getElementById('lampada-acesa');
            const caixa = document.getElementById('caixa-instrucao');

            // Troca a imagem da tecla
            img.src = `./tec_int_${interLigado ? 'on' : 'off'}.png`;

            if (interLigado) {
                // ESTADO LIGADO: Fica verde e mantém
                lamp.style.display = 'block';
                caixa.innerHTML = "LÂMPADA ACESA";
                caixa.className = "status-acesa";
            } else {
                // ESTADO DESLIGADO: Fica vermelho e mantém (sem piscar/resetar)
                lamp.style.display = 'none';
                caixa.innerHTML = "LÂMPADA APAGADA";
                caixa.className = "status-apagada";
            }
        }
    </script>
</body>
</html>
