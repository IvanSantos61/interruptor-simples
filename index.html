<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT Pro - Lógica Simplificada</title>
    <style>
        body { margin: 0; background-color: #0b0e14; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; overflow: hidden; touch-action: none; }
        h2 { color: #00ffff; margin-top: 15px; font-size: 18px; text-shadow: 0 0 10px #00ffff; text-transform: uppercase; }
        #quadro { position: relative; width: 100%; max-width: 500px; border: 2px solid #2c3e50; border-radius: 12px; overflow: hidden; background: #000; margin-top: 10px; }
        .fundo { width: 100%; display: block; pointer-events: none; }
        .alavanca, .tecla { position: absolute; z-index: 100; cursor: pointer; display: block; }
        
        /* Posições das Alavancas (OFF) */
        #img-dg { width: 28.5px; top: 25%; left: 11.2%; }
        #img-dr { width: 30px; top: 27.8%; left: 23%; }
        #img-dj16 { width: 20px; top: 26%; left: 32.2%; }

        /* POSIÇÃO DA TECLA DO INTERRUPTOR - Ajuste se necessário */
        #img-interruptor { width: 26px; top: 73%; left: 70%; z-index: 110; }

        .fio { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 40; 
            display: none; 
            pointer-events: none; 
            filter: drop-shadow(3px 5px 4px rgba(0,0,0,0.7)); 
        }

        .borne { position: absolute; width: 12px; height: 12px; background: rgba(0, 255, 255, 0.2); border: 1px solid rgba(0, 255, 255, 0.6); border-radius: 50%; z-index: 150; cursor: pointer; transform: translate(-50%, -50%); box-shadow: 0 0 5px rgba(0, 255, 255, 0.4); }

        #borne-dj16-saida { top: 37%; left: 34%; } 
        #borne-inter-entrada { top: 81%; left: 68%; } 
        #borne-inter-saida { top: 75%; left: 68%; }   
        #borne-lampada-retorno { top: 56%; left: 89%; }
        #borne-barramento-neutro { top: 33%; left: 44%; }
        #borne-lampada-neutro { top: 56%; left: 92%; }

        .status-box { margin: 15px 0; padding: 10px; width: 90%; max-width: 480px; text-align: center; background: rgba(0,0,0,0.8); border-radius: 8px; border: 1px solid #2c3e50; min-height: 35px; }
        #status-texto { color: #ffcc00; font-weight: bold; font-size: 13px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h2>Laboratório SMT Pro</h2>
    
    <div class="status-box">
        <span id="status-texto">CONECTE A FASE: DJ16 -> INTERRUPTOR</span>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">

        <img id="fio-fase" src="./FASE/quadro0000.png" class="fio">
        <img id="fio-retorno" src="./RETORNO/quadro0000.png" class="fio">
        <img id="fio-neutro" src="./NEUTRO/quadro0000.png" class="fio">

        <img id="img-dg" src="./al_dg_off.png" class="alavanca" onclick="alternarDG()">
        <img id="img-dr" src="./al_dr_off.png" class="alavanca" onclick="alternarDR()">
        <img id="img-dj16" src="./al_dj16_off.png" class="alavanca" onclick="alternarDJ16()">
        
        <img id="img-interruptor" src="./tec_int_off.png" class="tecla" onclick="alternarInterruptor()">

        <div id="borne-dj16-saida" class="borne" onclick="cliqueBorne('dj16')"></div>
        <div id="borne-inter-entrada" class="borne" onclick="cliqueBorne('inter_in')"></div>
        <div id="borne-inter-saida" class="borne" onclick="cliqueBorne('inter_out')"></div>
        <div id="borne-lampada-retorno" class="borne" onclick="cliqueBorne('lamp_ret')"></div>
        <div id="borne-barramento-neutro" class="borne" onclick="cliqueBorne('neutro_bar')"></div>
        <div id="borne-lampada-neutro" class="borne" onclick="cliqueBorne('lamp_neu')"></div>
    </div>

    <audio id="som-conexao" src="./conexão.mp3" preload="auto"></audio>

    <script>
        let faseStatus = 'desconectado';
        let retornoStatus = 'desconectado';
        let neutroStatus = 'desconectado';

        let dgLigado = false;
        let drLigado = false;
        let djLigado = false;
        let interLigado = false;
        
        const arquivosFase = ["quadro0000.png", "quadro0006.png", "quadro0012.png", "quadro0018.png", "quadro0024.png", "quadro0030.png"];
        const arquivosRetorno = ["quadro0000.png", "quadro0006.png", "quadro0012.png", "quadro0018.png", "quadro0024.png", "quadro0030.png", "quadro0036.png"];
        const arquivosNeutro = ["quadro0000.png", "quadro0006.png", "quadro0012.png", "quadro0018.png", "quadro0024.png", "quadro0030.png", "quadro0036.png", "quadro0042.png", "quadro0048.png", "quadro0054.png", "quadro0060.png", "quadro0066.png", "quadro0072.png", "quadro0078.png"];

        function animarFio(id, lista, index) {
            const el = document.getElementById(id);
            if (index === 0) el.style.display = 'block';
            if (index < lista.length) {
                const pasta = id.replace('fio-', '').toUpperCase();
                el.src = `./${pasta}/${lista[index]}`;
                let tempo = (id === 'fio-neutro') ? 90 : 80;
                setTimeout(() => animarFio(id, lista, index + 1), tempo);
            }
        }

        function cliqueBorne(local) {
            const txt = document.getElementById('status-texto');
            const som = document.getElementById('som-conexao');
            if (local === 'dj16' && faseStatus === 'desconectado') {
                faseStatus = 'iniciado'; som.play();
                txt.innerText = "FASE: SAÍDA CONECTADA. VÁ AO INTERRUPTOR.";
            } 
            else if (local === 'inter_in' && faseStatus === 'iniciado') {
                faseStatus = 'concluido'; som.play();
                animarFio('fio-fase', arquivosFase, 0);
                txt.innerText = "FASE OK! CONECTE O RETORNO: INTERRUPTOR -> LÂMPADA.";
            } 
            else if (local === 'inter_out' && faseStatus === 'concluido' && retornoStatus === 'desconectado') {
                retornoStatus = 'iniciado'; som.play();
                txt.innerText = "RETORNO: SAÍDA CONECTADA. VÁ ATÉ A LÂMPADA.";
            }
            else if (local === 'lamp_ret' && retornoStatus === 'iniciado') {
                retornoStatus = 'concluido'; som.play();
                animarFio('fio-retorno', arquivosRetorno, 0);
                txt.innerText = "RETORNO OK! AGORA O NEUTRO: BARRAMENTO -> LÂMPADA.";
            }
            else if (local === 'neutro_bar' && retornoStatus === 'concluido' && neutroStatus === 'desconectado') {
                neutroStatus = 'iniciado'; som.play();
                txt.innerText = "NEUTRO: BARRAMENTO CONECTADO. VÁ ATÉ A LÂMPADA.";
            }
            else if (local === 'lamp_neu' && neutroStatus === 'iniciado') {
                neutroStatus = 'concluido'; som.play();
                animarFio('fio-neutro', arquivosNeutro, 0);
                txt.innerText = "FIAÇÃO CONCLUÍDA! LIGUE O DISJUNTOR GERAL (DG).";
                txt.style.color = "#00ff00";
            }
        }

        function alternarDG() {
            if (neutroStatus !== 'concluido') { bloqueio(); return; }
            dgLigado = !dgLigado;
            const img = document.getElementById('img-dg');
            const txt = document.getElementById('status-texto');
            if (dgLigado) {
                img.src = "./al_dg_on.png";
                img.style.top = "25%"; img.style.left = "11%"; 
                txt.innerText = "GERAL LIGADO. AGORA LIGUE O DJ16.";
                txt.style.color = "#00ff00";
            } else {
                img.src = "./al_dg_off.png";
                img.style.top = "25%"; img.style.left = "11.2%";
                txt.innerText = "GERAL DESLIGADO.";
                txt.style.color = "#ffcc00";
            }
        }

        function alternarDR() {
            drLigado = !drLigado;
            const img = document.getElementById('img-dr');
            if (drLigado) {
                img.src = "./al_dr_on.png";
                img.style.top = "25%"; img.style.left = "23%";  
            } else {
                img.src = "./al_dr_off.png";
                img.style.top = "27.8%"; img.style.left = "23%";
            }
        }

        function alternarDJ16() {
            if (!dgLigado) { 
                const txt = document.getElementById('status-texto');
                txt.innerText = "ERRO: LIGUE O DISJUNTOR GERAL PRIMEIRO!";
                txt.style.color = "#ff4444";
                return; 
            }
            djLigado = !djLigado;
            const img = document.getElementById('img-dj16');
            const txt = document.getElementById('status-texto');
            if (djLigado) {
                img.src = "./al_dj16_on.png";
                img.style.top = "25%"; img.style.left = "31.6%"; 
                txt.innerText = "CIRCUITO ENERGIZADO! ACIONE O INTERRUPTOR.";
            } else {
                img.src = "./al_dj16_off.png";
                img.style.top = "26%"; img.style.left = "32.2%"; 
                txt.innerText = "CIRCUITO DESENERGIZADO.";
            }
        }

        // NOVA FUNÇÃO PARA O INTERRUPTOR
        function alternarInterruptor() {
            if (!djLigado) {
                const txt = document.getElementById('status-texto');
                txt.innerText = "ERRO: O CIRCUITO NÃO TEM ENERGIA (DJ16 DESLIGADO)!";
                txt.style.color = "#ff4444";
                return;
            }
            interLigado = !interLigado;
            const img = document.getElementById('img-interruptor');
            const txt = document.getElementById('status-texto');
            
            if (interLigado) {
                img.src = "./tec_int_on.png";
                txt.innerText = "LUZ ACESA!";
                txt.style.color = "#00ff00";
            } else {
                img.src = "./tec_int_off.png";
                txt.innerText = "LUZ APAGADA.";
                txt.style.color = "#ffffff";
            }
        }

        function bloqueio() {
            const txt = document.getElementById('status-texto');
            txt.innerText = "ALAVANCA TRAVADA: TERMINE A FIAÇÃO!";
            txt.style.color = "#ff4444";
        }
    </script>
</body>
</html>
