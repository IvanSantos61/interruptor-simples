<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT Pro - Laboratório Interativo</title>
    <style>
        body { 
            margin: 0; 
            background-color: #0b0e14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }

        h2 { 
            color: #00ffff; 
            margin-top: 15px; 
            font-size: 18px; 
            text-shadow: 0 0 10px #00ffff; 
            text-transform: uppercase;
        }

        #quadro { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid #2c3e50; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            margin-top: 10px; 
        }

        .fundo { 
            width: 100%; 
            display: block; 
            pointer-events: none; 
            -webkit-user-drag: none;
        }

        /* ÁREAS DE CLIQUE (AJUSTE AS POSIÇÕES AQUI) */
        .area-clique { 
            position: absolute; 
            cursor: pointer; 
            z-index: 100;
            /* REMOVA AS LINHAS ABAIXO QUANDO TERMINAR DE POSICIONAR */
            background: rgba(0, 255, 255, 0.3); 
            border: 1px solid #00ffff;
        }

        /* Ajuste top, left, width e height conforme os componentes na sua foto */
        #alavanca-dg { 
            width: 50px; 
            height: 70px; 
            top: 20%; 
            left: 15%; 
        }

        #alavanca-dj16 { 
            width: 40px; 
            height: 70px; 
            top: 20%; 
            left: 40%; 
        }

        #alavanca-interrup { 
            width: 60px; 
            height: 60px; 
            bottom: 25%; 
            right: 20%; 
        }

        .status-box {
            margin: 15px 0;
            padding: 10px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            border: 1px solid #2c3e50;
        }

        #status-texto { 
            color: #ffcc00; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-size: 14px; 
        }

        .camada-fio {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            display: none;
            pointer-events: none;
        }

        /* Efeito de energização suave em azul 70% */
        .fio-aceso {
            filter: drop-shadow(0 0 4px rgba(0, 170, 255, 0.7));
        }
    </style>
</head>
<body>

    <h2>Laboratório de Comandos</h2>
    
    <div class="status-box">
        <span id="status-texto">AGUARDANDO ENERGIZAÇÃO GERAL</span>
    </div>

    <div id="quadro">
        <img src="AMBIENTE.jpg" class="fundo">

        <div id="alavanca-dg" class="area-clique" onclick="acionar('dg')"></div>
        <div id="alavanca-dj16" class="area-clique" onclick="acionar('dj16')"></div>
        <div id="alavanca-interrup" class="area-clique" onclick="acionar('interrup')"></div>

        <div id="camadas-fios"></div>
    </div>

    <audio id="som-disj" src="disj.mp3" preload="auto"></audio>
    <audio id="som-conexao" src="conexão.mp3" preload="auto"></audio>

    <script>
        let ligado = { dg: false, dj16: false, interrup: false };

        function acionar(comp) {
            const sDisj = document.getElementById('som-disj');
            
            // Toca o som do clique
            sDisj.currentTime = 0;
            sDisj.play().catch(() => {});

            // Alterna o estado lógico
            ligado[comp] = !ligado[comp];

            atualizarPainel();
        }

        function atualizarPainel() {
            const txt = document.getElementById('status-texto');

            if (!ligado.dg) {
                txt.innerText = "SISTEMA DESLIGADO - LIGUE O DISJUNTOR GERAL";
                txt.style.color = "#ff4444";
            } 
            else if (ligado.dg && !ligado.dj16) {
                txt.innerText = "GERAL LIGADO - LIGUE O DISJUNTOR DO CIRCUITO";
                txt.style.color = "#ffcc00";
            }
            else if (ligado.dg && ligado.dj16 && !ligado.interrup) {
                txt.innerText = "CIRCUITO PRONTO - ACIONE O INTERRUPTOR";
                txt.style.color = "#00ffff";
            }
            else if (ligado.dg && ligado.dj16 && ligado.interrup) {
                txt.innerText = "⚡ CIRCUITO EM FUNCIONAMENTO (LÂMPADA ACESA)";
                txt.style.color = "#00ff00";
            }
        }
    </script>
</body>
</html>
