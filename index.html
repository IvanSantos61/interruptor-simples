<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - Laboratório</title>
    <style>
        body { margin: 0; background-color: #0b0e14; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; overflow: hidden; }
        
        #quadro { position: relative; width: 100%; max-width: 500px; border: 2px solid #2c3e50; border-radius: 12px; overflow: hidden; background: #000; margin-top: 10px; }
        .fundo { width: 100%; display: block; pointer-events: none; }
        
        /* POSIÇÃO CORRIGIDA BASEADA NA IMAGEM GRV.PNG */
        .btn-reset { 
            position: absolute; 
            top: 65%;      /* Logo abaixo da moldura cinza */
            left: 23%;     /* Alinhado na direção do DR, como indicado na seta */
            transform: translateX(-50%); /* Centraliza o próprio botão no eixo do DR */
            
            padding: 2px 8px; 
            background: rgba(255, 0, 0, 0.1); 
            color: #ff4444; 
            border: 1px solid #ff4444; 
            border-radius: 3px; 
            cursor: pointer; 
            font-size: 7px; 
            text-transform: uppercase; 
            font-weight: bold; 
            z-index: 200;
            transition: 0.2s;
        }
        .btn-reset:active { background: #ff4444; color: #000; }

        /* Coordenadas mantidas para não quebrar o simulador */
        #img-dg { width: 28.5px; top: 25%; left: 11.2%; position: absolute; z-index: 100; }
        #img-dr { width: 30px; top: 27.8%; left: 23%; position: absolute; z-index: 100; }
        #img-dj16 { width: 20px; top: 26%; left: 32.2%; position: absolute; z-index: 100; }
        #img-interruptor { width: 29px; top: 72.4%; left: 72%; position: absolute; z-index: 110; }
        #img-lampada { width: 120px; top: 46.8%; left: 76%; position: absolute; z-index: 105; display: none; }

        .fio { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 40; display: none; pointer-events: none; }
        .borne { position: absolute; width: 12px; height: 12px; z-index: 150; cursor: pointer; transform: translate(-50%, -50%); }
        
        .status-box { margin: 10px 0; padding: 10px; width: 90%; max-width: 480px; text-align: center; background: rgba(0,0,0,0.8); border-radius: 8px; border: 1px solid #2c3e50; }
        #status-texto { color: #ffcc00; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

    <div class="status-box">
        <span id="status-texto">CONECTE A FASE: DJ16 -> INTERRUPTOR</span>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">
        
        <!-- BOTÃO NA POSIÇÃO DA SETA DA IMAGEM GRV.PNG -->
        <button class="btn-reset" onclick="reiniciarLaboratorio()">REINICIAR</button>

        <img id="fio-fase" src="./FASE/quadro0000.png" class="fio">
        <img id="fio-retorno" src="./RETORNO/quadro0000.png" class="fio">
        <img id="fio-neutro" src="./NEUTRO/quadro0000.png" class="fio">

        <img id="img-dg" src="./al_dg_off.png" onclick="alternarDG()">
        <img id="img-dr" src="./al_dr_off.png" onclick="alternarDR()">
        <img id="img-dj16" src="./al_dj16_off.png" onclick="alternarDJ16()">
        
        <img id="img-lampada" src="./lamp_on.png">
        <img id="img-interruptor" src="./tec_int_off.png" onclick="alternarInterruptor()">

        <div id="borne-dj16-saida" class="borne" style="top: 37%; left: 34%;" onclick="cliqueBorne('dj16')"></div>
        <!-- ... demais bornes ... -->
    </div>

    <script>
        function reiniciarLaboratorio() {
            // Lógica de reset
            location.reload(); // Forma mais limpa de garantir o reset total
        }

        // Funções de alternar componentes (DG, DR, DJ, INT) e bornes...
    </script>
</body>
</html>
