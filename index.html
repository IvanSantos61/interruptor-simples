<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT - Simulação Completa</title>
    <style>
        body { margin: 0; background-color: #050a18; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        #titulo-geral { color: #00ffff; text-shadow: 0 0 15px #00ffff; font-size: 26px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        
        #container-instrucao {
            width: 95%; max-width: 800px; padding: 15px 20px; border: 1px solid #1a2a4a; 
            border-radius: 10px; background: rgba(5, 10, 24, 0.8); 
            margin-bottom: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 50px;
            position: relative;
        }
        
        #caixa-instrucao { text-align: center; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        
        /* Pílula CONCLUÍDO - Estilo conforme sua indicação (Seta Amarela) */
        #pilula-concluido {
            display: none;
            background-color: #ffcc00;
            color: #000;
            padding: 4px 20px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
            box-shadow: 0 0 10px #ffcc00;
            border: 1px solid #fff;
        }

        .status-acesa { 
            background-color: #008000; color: #90ee90; padding: 6px 25px; border-radius: 50px; 
            box-shadow: 0 0 15px #008000; display: inline-block; border: 1px solid rgba(255,255,255,0.2);
        }

        .status-apagada { 
            background-color: #b30000; color: #ffcccc; padding: 6px 25px; border-radius: 50px; 
            box-shadow: 0 0 15px #b30000; display: inline-block; border: 1px solid rgba(255,255,255,0.2);
        }

        .txt-laranja { color: #ff8c00; }
        .txt-verde { color: #90ee90; }
        .txt-vermelho { color: #ff3333; }
        .txt-branco { color: #ffffff; }
        .msg-final { color: #ffcc00; }

        #quadro { position: relative; width: 100%; max-width: 500px; }
        .fundo { width: 100%; display: block; border-radius: 8px; }
        .cabo { position: absolute; top: 0; left: 0; width: 100%; height: auto; display: none; pointer-events: none; }
        
        .borne { position: absolute; width: 12px; height: 12px; background: rgba(0, 255, 255, 0.4); border: 1px solid #00ffff; border-radius: 50%; z-index: 100; cursor: pointer; transform: translate(-50%, -50%); display: none; }
        .interativo { position: absolute; z-index: 50; cursor: pointer; }

        #tecla-int { top: 73%; left: 72%; width:27px; }
        #lampada-acesa { position: absolute; top: 47%; left: 76.3%; width:118px; display: none; z-index: 45; pointer-events: none; }
    </style>
</head>
<body>

    <div id="titulo-geral">LABORATÓRIO SMT PRO</div>

    <div id="container-instrucao">
        <div id="caixa-instrucao">
            <span class="txt-laranja">CONECTE A FASE.</span> <span class="txt-verde">CLIQUE NA REFERÊNCIA DO DR.</span>
        </div>
        <div id="pilula-concluido">CONCLUÍDO</div>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">
        <img id="lampada-acesa" src="./lamp_on.png">
        
        <!-- Elementos Interativos Simplificados para o exemplo -->
        <img id="tecla-int" class="interativo" src="./tec_int_off.png" onclick="alternarInterruptor()">
    </div>

    <script>
        let dispositivos = { int: false };
        let statusFiacao = true; // Simulado como concluído para o teste da lógica
        let timerGeral;

        function atualizarLuz() {
            const lampada = document.getElementById('lampada-acesa');
            const caixa = document.getElementById('caixa-instrucao');
            const pilula = document.getElementById('pilula-concluido');

            clearTimeout(timerGeral);

            if (dispositivos.int && statusFiacao) {
                // LIGA
                lampada.style.display = 'block';
                caixa.innerHTML = "LÂMPADA ACESA";
                caixa.className = "status-acesa";
                pilula.style.display = "none";
            } else {
                // DESLIGA
                lampada.style.display = 'none';
                caixa.innerHTML = "LÂMPADA APAGADA";
                caixa.className = "status-apagada";
                
                // Mostra o CONCLUÍDO separado
                pilula.style.display = "block";

                // Após 3 segundos, reseta para a mensagem padrão de fiação concluída
                timerGeral = setTimeout(() => {
                    caixa.className = "";
                    caixa.innerHTML = '<span class="msg-final">FIAÇÃO CONCLUÍDA! LIGUE OS DISJUNTORES E O INTERRUPTOR.</span>';
                    pilula.style.display = "none";
                }, 3000);
            }
        }

        function alternarInterruptor() {
            dispositivos.int = !dispositivos.int;
            const img = document.getElementById('tecla-int');
            img.src = `./tec_int_${dispositivos.int ? 'on' : 'off'}.png`;
            atualizarLuz();
        }
    </script>
</body>
</html>
