<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT Pro - Posicionamento</title>
    <style>
        body { 
            margin: 0; 
            background-color: #0b0e14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }

        h2 { 
            color: #00ffff; 
            margin-top: 15px; 
            font-size: 18px; 
            text-shadow: 0 0 10px #00ffff; 
            text-transform: uppercase;
        }

        #quadro { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid #2c3e50; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            margin-top: 10px; 
        }

        .fundo { 
            width: 100%; 
            display: block; 
            pointer-events: none; 
            -webkit-user-drag: none;
        }

        /* IMAGENS DAS ALAVANCAS - AJUSTE AQUI */
        .alavanca {
            position: absolute;
            z-index: 50;
            cursor: pointer;
            /* Se quiser ver uma borda para ajudar a posicionar, use a linha abaixo: */
            /* outline: 1px solid red; */
        }

        /* Mude os valores de top e left para alinhar com o seu fundo */
        #img-dg { 
            width: 45px; 
            top: 25%; 
            left: 20%; 
        }

        #img-dr { 
            width: 45px; 
            top: 25%; 
            left: 35%; 
        }

        #img-dj16 { 
            width: 40px; 
            top: 25%; 
            left: 50%; 
        }

        /* O interruptor geralmente fica mais abaixo */
        #img-interrup {
            width: 50px;
            bottom: 20%;
            right: 15%;
            position: absolute;
            z-index: 50;
        }

        .status-box {
            margin: 15px 0;
            padding: 10px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            border: 1px solid #2c3e50;
            min-height: 40px;
        }

        #status-texto { 
            color: #ffcc00; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 13px; 
        }

        .alerta-erro { color: #ff4444 !important; }
    </style>
</head>
<body>

    <h2>Laboratório Interativo</h2>
    
    <div class="status-box">
        <span id="status-texto">POSICIONE OS COMPONENTES E FINALIZE A MONTAGEM</span>
    </div>

    <div id="quadro">
        <img src="AMBIENTE.jpg" class="fundo">

        <img id="img-dg" src="AL_DG_OFF.png" class="alavanca" onclick="tentarAcionar('Geral')">
        <img id="img-dr" src="AL_DR_OFF.png" class="alavanca" onclick="tentarAcionar('DR')">
        <img id="img-dj16" src="AL_DJ16_OFF.png" class="alavanca" onclick="tentarAcionar('Circuito')">
        
        <img id="img-interrup" src="AL_DJ16_OFF.png" class="alavanca" onclick="tentarAcionar('Interruptor')">
    </div>

    <audio id="som-disj" src="disj.mp3" preload="auto"></audio>

    <script>
        let circuitoFinalizado = false; 

        function tentarAcionar(nome) {
            const txt = document.getElementById('status-texto');
            if (!circuitoFinalizado) {
                txt.innerText = "ERRO: O " + nome.toUpperCase() + " NÃO PODE SER LIGADO SEM A FIAÇÃO!";
                txt.classList.add('alerta-erro');
                
                setTimeout(() => {
                    txt.classList.remove('alerta-erro');
                    txt.innerText = "POSICIONE OS COMPONENTES E FINALIZE A MONTAGEM";
                }, 2000);
            }
        }
    </script>
</body>
</html>
