<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT Pro - Ajuste de Imagens</title>
    <style>
        body { 
            margin: 0; 
            background-color: #0b0e14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }

        h2 { 
            color: #00ffff; 
            margin-top: 15px; 
            font-size: 18px; 
            text-shadow: 0 0 10px #00ffff; 
            text-transform: uppercase;
        }

        #quadro { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid #2c3e50; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #222; /* Cor de fundo caso a imagem falhe */
            margin-top: 10px; 
        }

        .fundo { 
            width: 100%; 
            display: block; 
            pointer-events: none; 
        }

        /* CONFIGURAÇÃO DAS ALAVANCAS */
        .alavanca {
            position: absolute;
            z-index: 100;
            cursor: pointer;
            display: block !important;
            /* Se as imagens ainda não aparecerem, a borda vermelha vai te mostrar onde elas deveriam estar */
            border: 1px solid rgba(255, 0, 0, 0.5);
        }

        /* Posições iniciais para você ajustar */
        #img-dg { width: 50px; top: 20%; left: 15%; }
        #img-dr { width: 50px; top: 20%; left: 35%; }
        #img-dj16 { width: 45px; top: 20%; left: 55%; }

        .status-box {
            margin: 15px 0;
            padding: 10px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            border-radius: 8px;
            border: 1px solid #00ffff;
            min-height: 30px;
        }

        #status-texto { 
            color: #00ffff; 
            font-weight: bold; 
            font-size: 13px; 
        }
    </style>
</head>
<body>

    <h2>Laboratório de Teste</h2>
    
    <div class="status-box">
        <span id="status-texto">VERIFIQUE SE AS BORDAS VERMELHAS APARECEM</span>
    </div>

    <div id="quadro">
        <img src="AMBIENTE.jpg" class="fundo" onerror="this.src='https://via.placeholder.com/500x300?text=Erro+ao+carregar+AMBIENTE.jpg'">

        <img id="img-dg" src="AL_DG_OFF.PNG" class="alavanca">
        <img id="img-dr" src="AL_DR_OFF.PNG" class="alavanca">
        <img id="img-dj16" src="AL_DJ16_OFF.PNG" class="alavanca">
    </div>

    <script>
        console.log("Sistema carregado. Verifique os nomes dos arquivos no GitHub.");
    </script>
</body>
</html>
