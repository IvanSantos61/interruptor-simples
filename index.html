<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT Pro - Laboratório</title>
    <style>
        body { margin: 0; background-color: #050a18; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; overflow: hidden; touch-action: none; }
        h2 { color: #00ffff; margin-top: 15px; font-size: 18px; text-shadow: 0 0 10px #00ffff; text-transform: uppercase; }
        
        .status-box { margin: 15px 0; padding: 10px; width: 90%; max-width: 480px; text-align: center; background: rgba(5, 15, 30, 0.9); border-radius: 8px; border: 1px solid #1a2a3a; min-height: 35px; transition: background-color 0.3s; position: relative; }
        #status-texto { color: #ffcc00; font-weight: bold; font-size: 11px; text-transform: uppercase; }

        /* --- PAINEL FINAL ESTILO GRAVURA --- */
        #painel-concluido {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            width: 320px;
            height: 160px;
            background: #121212;
            border: 5px solid #333;
            border-radius: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,255,0,0.1);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #painel-concluido.mostrar { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        
        .parafuso { position: absolute; width: 14px; height: 14px; background: #3a3a3a; border-radius: 50%; border: 2px solid #1a1a1a; box-shadow: inset 2px 2px 2px rgba(255,255,255,0.1); }
        .p-tl { top: 8px; left: 8px; } .p-tr { top: 8px; right: 8px; }
        .p-bl { bottom: 8px; left: 8px; } .p-br { bottom: 8px; right: 8px; }

        #check-concluido { color: #00ff00; font-size: 60px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 15px rgba(0,255,0,0.5); }
        #texto-concluido { color: #00ff00; font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; }

        /* --- OVERLAY INICIAL --- */
        #overlay-inicio {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
            animation: sumirOverlay 4s ease-in-out forwards;
        }
        #caixa-mensagem {
            background: #050a18; border: 4px solid #00ffff; padding: 40px 30px; border-radius: 25px;
            text-align: center; box-shadow: 0 0 30px rgba(0, 255, 255, 0.6); width: 320px;
        }
        #caixa-mensagem h1 { margin: 0; font-size: 20px; color: #00ffff; text-transform: uppercase; }
        @keyframes sumirOverlay { 0%, 85% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        /* QUADRO E COMPONENTES */
        #quadro { position: relative; width: 100%; max-width: 500px; border: 2px solid #1a2a3a; border-radius: 12px; overflow: hidden; background: #02050d; margin-top: 10px; }
        .fundo { width: 100%; display: block; pointer-events: none; }
        .alavanca, .tecla, .lampada { position: absolute; z-index: 100; cursor: pointer; }
        
        #img-dg { width: 25.5px; top: 25%; left: 11.2%; }
        #img-dr { width: 30px; top: 27.8%; left: 23%; }
        #img-dj16 { width: 20px; top: 25%; left: 32%; }
        #img-interruptor { width: 29px; top: 72.4%; left: 72%; z-index: 110; }
        #img-lampada { width: 120px; top: 46.8%; left: 76%; z-index: 105; display: none; }

        .fio { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 40; display: none; pointer-events: none; }
        .borne { position: absolute; width: 14px; height: 14px; background: rgba(0, 255, 255, 0.4); border: 2px solid #00ffff; border-radius: 50%; z-index: 150; cursor: pointer; transform: translate(-50%, -50%); display: none; }
        .borne.ativo { display: block; }
        .borne.selecionado { background: #00ff00; border-color: #ffffff; box-shadow: 0 0 15px #00ff00; }

        #borne-dj16-saida { top: 38%; left: 27%; } 
        #borne-inter-entrada { top: 81%; left: 68%; } 
        #borne-inter-saida { top: 75%; left: 68%; }    
        #borne-lampada-retorno { top: 56%; left: 89%; }
        #borne-barramento-neutro { top: 33%; left: 44%; }
        #borne-lampada-neutro { top: 56%; left: 92%; }

        #btn-reiniciar {
            position: absolute; top: 95%; left: 50%; transform: translate(-50%, -50%); padding: 4px 18px;
            background: linear-gradient(to bottom, #e60000, #990000); border: none; border-bottom: 3px solid #660000;
            color: white; font-size: 9px; font-weight: bold; cursor: pointer; border-radius: 50px; z-index: 200; text-transform: uppercase;
        }

        .tooltip-balao { position: absolute; background: #fff; color: #222; padding: 6px; border-radius: 8px; font-size: 9px; font-weight: bold; width: 110px; z-index: 400; opacity: 0; transition: 0.3s; pointer-events: none; text-align: center; }
        .show-balao { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="overlay-inicio">
        <div id="caixa-mensagem">
            <h1>Interruptor Simples</h1>
            <div style="font-size: 14px; color: #fff; margin-top: 20px;">Circuito Monofásico - 127V</div>
            <div style="width: 150px; height: 1px; background: rgba(0, 255, 255, 0.3); margin: 20px auto;"></div>
            <div style="font-size: 9px; color: rgba(255, 255, 255, 0.9);">© Desenvolvido por Ivan Santos</div>
        </div>
    </div>

    <h2>Laboratório SMT Pro</h2>
    
    <div class="status-box">
        <span id="status-texto">CONECTE A FASE: CLIQUE NA SAÍDA DO DJ16</span>
    </div>

    <div id="painel-concluido">
        <div class="parafuso p-tl"></div><div class="parafuso p-tr"></div>
        <div class="parafuso p-bl"></div><div class="parafuso p-br"></div>
        <div id="check-concluido">✓</div>
        <div id="texto-concluido">CONCLUÍDO !!!!!</div>
    </div>

    <div id="quadro">
        <img src="./ambiente.jpg" class="fundo">
        <button id="btn-reiniciar" onclick="location.reload()">Reiniciar</button>

        <!-- Fios -->
        <img id="fio-fase" src="./FASE/quadro0000.png" class="fio">
        <img id="fio-retorno" src="./RETORNO/quadro0000.png" class="fio">
        <img id="fio-neutro" src="./NEUTRO/quadro0000.png" class="fio">

        <!-- Componentes -->
        <img id="img-dg" src="./al_dg_off.png" class="alavanca" onclick="alternarDG()">
        <img id="img-dr" src="./al_dr_off.png" class="alavanca" onclick="alternarDR()">
        <img id="img-dj16" src="./al_dj16_off.png" class="alavanca" onclick="alternarDJ16()">
        <img id="img-lampada" src="./lamp_on.png" class="lampada">
        <img id="img-interruptor" src="./tec_int_off.png" class="tecla" onclick="alternarInterruptor()">

        <!-- Bornes -->
        <div id="borne-dj16-saida" class="borne ativo" onclick="cliqueBorne('dj16')"></div>
        <div id="borne-inter-entrada" class="borne ativo" onclick="cliqueBorne('inter_in')"></div>
        <div id="borne-inter-saida" class="borne" onclick="cliqueBorne('inter_out')"></div>
        <div id="borne-lampada-retorno" class="borne" onclick="cliqueBorne('lamp_ret')"></div>
        <div id="borne-barramento-neutro" class="borne" onclick="cliqueBorne('neutro_bar')"></div>
        <div id="borne-lampada-neutro" class="borne" onclick="cliqueBorne('lamp_neu')"></div>
    </div>

    <audio id="som-conexao" src="./conexão.mp3"></audio>
    <audio id="som-disjuntor" src="./disj.mp3"></audio>
    <audio id="som-interruptor" src="./int.mp3"></audio>
    <audio id="som-erro" src="./erro.mp3"></audio>

    <script>
        let faseStatus = 'desconectado', retornoStatus = 'desconectado', neutroStatus = 'desconectado';
        let dgLigado = false, drLigado = false, djLigado = false, interLigado = false;
        let testeConcluido = false;

        function cliqueBorne(local) {
            const txt = document.getElementById('status-texto');
            const som = document.getElementById('som-conexao');
            
            if (local === 'dj16' && faseStatus === 'desconectado') {
                faseStatus = 'iniciado'; som.play();
                document.getElementById('borne-dj16-saida').classList.add('selecionado');
                txt.innerText = "ORIGEM CONECTADA. AGORA CLIQUE NA ENTRADA DO INTERRUPTOR.";
            } 
            else if (local === 'inter_in' && faseStatus === 'iniciado') {
                faseStatus = 'concluido'; som.play();
                document.getElementById('borne-inter-entrada').classList.add('selecionado');
                animarFio('fio-fase', 6, () => { 
                    document.getElementById('borne-dj16-saida').classList.remove('ativo');
                    document.getElementById('borne-inter-entrada').classList.remove('ativo');
                    document.getElementById('borne-inter-saida').classList.add('ativo');
                    document.getElementById('borne-lampada-retorno').classList.add('ativo');
                    txt.innerText = "FASE OK! CONECTE O RETORNO: CLIQUE NA SAÍDA DO INTERRUPTOR.";
                });
            } 
            else if (local === 'inter_out' && retornoStatus === 'desconectado' && faseStatus === 'concluido') {
                retornoStatus = 'iniciado'; som.play();
                document.getElementById('borne-inter-saida').classList.add('selecionado');
                txt.innerText = "RETORNO INICIADO. CLIQUE NO BORNE DA LÂMPADA.";
            }
            else if (local === 'lamp_ret' && retornoStatus === 'iniciado') {
                retornoStatus = 'concluido'; som.play();
                document.getElementById('borne-lampada-retorno').classList.add('selecionado');
                animarFio('fio-retorno', 7, () => { 
                    document.getElementById('borne-inter-saida').classList.remove('ativo');
                    document.getElementById('borne-lampada-retorno').classList.remove('ativo');
                    document.getElementById('borne-barramento-neutro').classList.add('ativo');
                    document.getElementById('borne-lampada-neutro').classList.add('ativo');
                    txt.innerText = "RETORNO OK! CONECTE O NEUTRO: CLIQUE NO BARRAMENTO.";
                });
            }
            else if (local === 'neutro_bar' && neutroStatus === 'desconectado' && retornoStatus === 'concluido') {
                neutroStatus = 'iniciado'; som.play();
                document.getElementById('borne-barramento-neutro').classList.add('selecionado');
                txt.innerText = "NEUTRO INICIADO. CLIQUE NO BORNE DIREITO DA LÂMPADA.";
            }
            else if (local === 'lamp_neu' && neutroStatus === 'iniciado') {
                neutroStatus = 'concluido'; som.play();
                document.getElementById('borne-lampada-neutro').classList.add('selecionado');
                animarFio('fio-neutro', 14, () => { 
                    document.getElementById('borne-barramento-neutro').classList.remove('ativo');
                    document.getElementById('borne-lampada-neutro').classList.remove('ativo');
                    txt.innerText = "FIAÇÃO CONCLUÍDA! LIGUE O GERAL, O DR E O INTERRUPTOR.";
                    txt.style.color = "#00ff00";
                });
            }
            else { dispararErro("SIGA OS PONTOS INDICADOS!"); }
        }

        function alternarDG() {
            if (neutroStatus !== 'concluido') { dispararErro("TERMINE A FIAÇÃO!"); return; }
            document.getElementById('som-disjuntor').play();
            dgLigado = !dgLigado;
            document.getElementById('img-dg').src = dgLigado ? "./al_dg_on.png" : "./al_dg_off.png";
            atualizarSistema();
        }

        function alternarDR() {
            if (!dgLigado) { dispararErro("LIGUE O GERAL (DG) PRIMEIRO!"); return; }
            document.getElementById('som-disjuntor').play();
            drLigado = !drLigado;
            const img = document.getElementById('img-dr');
            img.src = drLigado ? "./al_dr_on.png" : "./al_dr_off.png";
            img.style.top = drLigado ? "25.3%" : "27.8%";
            atualizarSistema();
        }

        function alternarDJ16() { 
            document.getElementById('som-disjuntor').play();
            djLigado = !djLigado; 
            document.getElementById('img-dj16').src = djLigado ? "./al_dj16_on.png" : "./al_dj16_off.png"; 
            atualizarSistema();
        }

        function alternarInterruptor() { 
            document.getElementById('som-interruptor').play();
            interLigado = !interLigado; 
            document.getElementById('img-interruptor').src = interLigado ? "./tec_int_on.png" : "./tec_int_off.png"; 
            atualizarSistema(); 
        }

        function atualizarSistema() {
            const lamp = document.getElementById('img-lampada');
            const txt = document.getElementById('status-texto');
            const painel = document.getElementById('painel-concluido');

            if (dgLigado && drLigado && djLigado && interLigado) {
                lamp.style.display = "block";
                txt.innerText = "LUZ ACESA!";
                testeConcluido = true;
            } else {
                lamp.style.display = "none";
                if (testeConcluido && !interLigado) {
                    txt.innerText = "LÂMPADA APAGADA";
                    setTimeout(() => {
                        painel.classList.add('mostrar');
                        setTimeout(() => painel.classList.remove('mostrar'), 4000);
                    }, 3000);
                    testeConcluido = false; 
                } else if (neutroStatus === 'concluido') {
                    txt.innerText = "LIGUE O GERAL, O DR E O INTERRUPTOR.";
                }
            }
        }

        function animarFio(id, total, cb) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            let i = 0;
            const pasta = id.replace('fio-', '').toUpperCase();
            const intervalo = setInterval(() => {
                const num = String(i * 6).padStart(4, '0');
                el.src = `./${pasta}/quadro${num}.png`;
                if (i >= total) { clearInterval(intervalo); cb(); }
                i++;
            }, 80);
        }

        function dispararErro(msg) {
            const txt = document.getElementById('status-texto');
            document.getElementById('som-erro').play();
            const original = txt.innerText;
            txt.innerText = msg; txt.style.color = "#ff4444";
            setTimeout(() => { txt.innerText = original; txt.style.color = neutroStatus === 'concluido' ? "#00ff00" : "#ffcc00"; }, 2000);
        }
    </script>
</body>
</html>
